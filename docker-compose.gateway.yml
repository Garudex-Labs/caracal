# Caracal Core - Gateway Sync Reference
#
# NOTE: The Caracal Dev Gateway is an ENTERPRISE feature.
# The authoritative gateway code lives in:
#   caracalEnterprise/services/gateway/
#
# This file exists only so that tooling that invokes
#   docker-compose -f Caracal/docker-compose.gateway.yml up -d
# still works by delegating to the enterprise gateway image.
#
# To start the gateway standalone, prefer:
#   cd caracalEnterprise/services/gateway && docker-compose up -d
#
# To start the full enterprise stack (recommended):
#   cd caracalEnterprise && docker-compose up -d

services:
  gateway:
    build:
      context: ../caracalEnterprise/services/gateway
      dockerfile: Dockerfile
    container_name: caracal-gateway-dev
    environment:
      GATEWAY_PORT: "${GATEWAY_DEV_PORT:-8443}"
      GATEWAY_API_KEY: "${GATEWAY_API_KEY:-}"
      GATEWAY_ADMIN_KEY: "${GATEWAY_ADMIN_KEY:-}"
    ports:
      - "${GATEWAY_DEV_PORT:-8443}:${GATEWAY_DEV_PORT:-8443}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:${GATEWAY_DEV_PORT:-8443}/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
