# Codecov configuration: paths excluded from coverage reporting.

ignore:
  # Documentation site content and configuration.
  - "docs/**"
  # Generated TypeScript artifacts.
  - "**/*.gen.ts"
  # Process entrypoints: env wiring and signal plumbing only, exercised by smoke tests.
  - "apps/*/src/main.ts"
  # Thin pgx adapters: SQL passthrough reachable only against live Postgres,
  # exercised by the integration and e2e suites that require infrastructure.
  - "services/*/internal/db.go"
  # Thin go-redis adapters: command passthrough reachable only against live Redis,
  # exercised by the integration and e2e suites that require infrastructure.
  - "services/*/internal/redis.go"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
