#
# Validates the Caracal monorepo across TypeScript, Go, Python, and documentation builds.

name: test

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - '.prettierrc.json'
      - 'scripts/checkStyle.mjs'
      - 'scripts/pythonStyleRequirements.in'
      - 'scripts/pythonStyleRequirements.lock'
      - 'scripts/pythonTestRequirements.in'
      - 'scripts/pythonTestRequirements.lock'
      - 'scripts/setupDev.mjs'
      - 'apps/**'
      - 'docs/**'
      - 'infra/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'go.work'
      - 'go.work.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'
  BUN_VERSION: '1.3.14'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.14'
  GOTOOLCHAIN: auto
  ASTRO_TELEMETRY_DISABLED: '1'
  CI: true

jobs:
  smoke:
    name: Workspace build
    if: github.repository == 'Garudex-Labs/caracal' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: TypeScript build (topological)
        run: pnpm -r build

  changes:
    name: Detect changes
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      typescript: ${{ steps.paths.outputs.typescript }}
      go: ${{ steps.paths.outputs.go }}
      python: ${{ steps.paths.outputs.python }}
      style: ${{ steps.paths.outputs.style }}
      docs: ${{ steps.paths.outputs.docs }}
      postgres: ${{ steps.paths.outputs.postgres }}
      helm: ${{ steps.paths.outputs.helm }}
      infra: ${{ steps.paths.outputs.infra }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: paths
        shell: bash
        run: |
          {
            if [[ '${{ github.event_name }}' != 'pull_request' ]]; then
              echo 'typescript=true'
              echo 'go=true'
              echo 'python=true'
              echo 'style=true'
              echo 'docs=true'
              echo 'postgres=true'
              echo 'helm=true'
              echo 'infra=true'
              exit 0
            fi

            git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.sha }}' > changed.txt
            typescript=false
            go=false
            python=false
            style=false
            docs=false
            postgres=false
            helm=false
            infra=false
            # bash case patterns are not pathname-aware: * matches across '/',
            # so these globs intentionally over-match and err toward running an
            # extra job rather than skipping a needed one. Detection never
            # under-triggers; precision is traded for safety.
            while IFS= read -r path; do
              case "$path" in
                .github/workflows/test.yml|.prettierrc.json|scripts/checkStyle.mjs|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|apps/**|packages/engine/**|packages/*/ts/**|packages/adapters/*/ts/**|packages/backends/*/ts/**|tests/typescript/**)
                  typescript=true
                  style=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|go.work|go.work.sum|services/**|packages/*/go/**|packages/adapters/*/go/**|packages/backends/*/go/**|tests/go/**|tests/source/go/**)
                  go=true
                  style=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|scripts/pythonStyleRequirements.in|scripts/pythonStyleRequirements.lock|scripts/setupDev.mjs|packages/*/python/**|packages/adapters/*/python/**|packages/backends/*/python/**|tests/python/**|tests/shared/test-utils/python/**)
                  python=true
                  style=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|docs/**|package.json|pnpm-lock.yaml|pnpm-workspace.yaml)
                  docs=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|infra/postgres/**)
                  postgres=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|infra/helm/**)
                  helm=true
                  ;;
              esac
              case "$path" in
                .github/workflows/test.yml|infra/docker/**|infra/scripts/**|infra/tofu/**|infra/redis/**|infra/secrets/**|infra/healthcheck/**)
                  infra=true
                  ;;
              esac
            done < changed.txt

            echo "typescript=$typescript"
            echo "go=$go"
            echo "python=$python"
            echo "style=$style"
            echo "docs=$docs"
            echo "postgres=$postgres"
            echo "helm=$helm"
            echo "infra=$infra"
          } >> "$GITHUB_OUTPUT"

  style:
    name: Style checks
    needs: changes
    if: |
      always() && github.repository == 'Garudex-Labs/caracal' &&
      ((github.event_name == 'pull_request' && needs.changes.outputs.style == 'true') || github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/pythonStyleRequirements.lock

      - name: Install style dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          python -m pip install --require-hashes --requirement scripts/pythonStyleRequirements.lock

      - name: Check changed source style
        if: github.event_name == 'pull_request'
        env:
          STYLE_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: pnpm run style

      - name: Check full source style
        if: github.event_name == 'push'
        run: pnpm run style --all

  typescript:
    name: TypeScript lint, types, tests, build
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate runtime embedded assets
        run: pnpm --dir apps/runtime sync-embedded

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Verify SDK package exports
        run: node tests/typescript/contract/sdk/package-consumer.mjs

      - name: Run lint scripts
        run: pnpm -r --if-present lint

      - name: Run type checks
        run: pnpm -r --if-present typecheck

      - name: Run TypeScript tests with coverage
        run: node scripts/runTsTests.mjs --coverage

      - name: List TypeScript coverage outputs
        if: always()
        shell: bash
        run: |
          echo 'Coverage tree:'
          ls -laR coverage/typescript 2>&1 || echo 'coverage/typescript missing'

      - name: Upload TypeScript coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-typescript
          path: coverage/typescript/**/lcov.info
          if-no-files-found: error
          retention-days: 7

  go:
    name: Go tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Go vet
        run: node scripts/runGoTests.mjs --vet

      - name: Run Go tests with coverage
        run: node scripts/runGoTests.mjs --coverage

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-go
          path: coverage/go/coverage.out
          if-no-files-found: error
          retention-days: 7

  python:
    name: Python tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            packages/core/python/pyproject.toml
            packages/oauth/python/pyproject.toml
            packages/identity/python/pyproject.toml
            packages/revocation/python/pyproject.toml
            packages/sdk/python/pyproject.toml
            packages/verify/python/pyproject.toml
            packages/adapters/fastmcp/python/pyproject.toml
            packages/adapters/asgi/python/pyproject.toml
            packages/backends/redis/python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes --requirement scripts/pythonTestRequirements.lock

      - name: Run Python tests with coverage
        run: node scripts/runPythonTests.mjs --coverage -v

      - name: List Python coverage outputs
        if: always()
        shell: bash
        run: ls -la coverage/python 2>&1 || echo 'coverage/python missing'

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-python
          path: coverage/python/coverage.xml
          if-no-files-found: error
          retention-days: 7

  docs:
    name: Docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build static docs
        run: |
          node scripts/validateOpsDocs.mjs
          pnpm --dir docs build

      - name: Verify docs artifact
        run: |
          set -euo pipefail
          test -f docs/dist/index.html
          test -f docs/dist/CNAME
          grep -Fx 'docs.caracal.run' docs/dist/CNAME

  postgres:
    name: PostgreSQL migrations
    needs: changes
    if: needs.changes.outputs.postgres == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
        env:
          POSTGRES_DB: caracal
          POSTGRES_USER: caracal
          POSTGRES_PASSWORD: caracal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caracal -d caracal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Validate migrations
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: caracal
          PGDATABASE: caracal
          PGPASSWORD: caracal
        run: bash infra/postgres/scripts/validateMigrations.sh

  helm:
    name: Helm chart
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Helm chart
        run: bash infra/helm/caracal/scripts/validate.sh

  infra:
    name: Infrastructure validation
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Shellcheck infra scripts
        run: shellcheck infra/scripts/*.sh infra/tofu/scripts/*.sh infra/redis/*.sh infra/postgres/scripts/*.sh infra/helm/caracal/scripts/*.sh

      - name: Validate compose files
        env:
          CARACAL_VERSION: 0.0.0
        run: |
          docker compose -f infra/docker/docker-compose.yml config --quiet
          docker compose -f infra/docker/runtime-compose.yml config --quiet

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: 1.11.5

      - name: Validate OpenTofu configuration
        run: bash infra/tofu/scripts/validate.sh

  e2e:
    name: Stack end-to-end
    needs: changes
    if: github.event_name != 'pull_request' && (needs.changes.outputs.go == 'true' || needs.changes.outputs.typescript == 'true' || needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Start the stack from source
        run: pnpm caracal up --quiet-pull

      - name: Wait for stack readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            if pnpm caracal status --ready --json > /dev/null 2>&1; then
              pnpm caracal status --ready
              exit 0
            fi
            sleep 5
          done
          echo '::error::Stack did not become ready in time.'
          pnpm caracal status --ready || true
          exit 1

      - name: Build SDK contract clients
        run: pnpm run build:typescript

      - name: Start protected test upstream
        run: docker run --rm -d --name caracal-protected-e2e-upstream --network caracalDevData nginx:stable-alpine

      - name: Run Go stack contracts
        working-directory: tests/go
        env:
          CARACAL_STS_URL: http://127.0.0.1:8080
        run: go test -count=1 ./e2e/... ./smoke/...

      - name: Run protected-resource contract
        env:
          CARACAL_API_URL: http://127.0.0.1:3000
          CARACAL_COORDINATOR_URL: http://127.0.0.1:4000
          CARACAL_STS_URL: http://127.0.0.1:8080
          CARACAL_GATEWAY_URL: http://127.0.0.1:8081
          CARACAL_E2E_UPSTREAM_URL: http://caracal-protected-e2e-upstream:80
          CARACAL_ADMIN_TOKEN_FILE: ${{ runner.temp }}/caracal-admin-token
        run: |
          cp "$HOME/.config/caracal/dev-secrets/caracalAdminToken" "$CARACAL_ADMIN_TOKEN_FILE"
          node tests/typescript/e2e/protected-resource.mjs

      - name: Dump service logs on failure
        if: failure()
        shell: bash
        run: |
          docker ps --all --format '{{.Names}}	{{.Status}}'
          for name in $(docker ps --all --format '{{.Names}}' | grep caracal || true); do
            echo "=== ${name} ==="
            docker logs --tail 150 "$name" 2>&1 || true
          done

      - name: Stop the stack
        if: always()
        run: |
          docker rm -f caracal-protected-e2e-upstream 2>/dev/null || true
          pnpm caracal down -v || true

  releaseConfig:
    name: Release config drift
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Verify version pins
        run: node scripts/release.mjs stamp --check

  coverage:
    name: Upload coverage
    needs:
      - typescript
      - go
      - python
    if: always() && !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (needs.typescript.result == 'success' || needs.go.result == 'success' || needs.python.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage

      - name: List coverage files
        run: find coverage -maxdepth 4 -type f -print | sort

      - name: Upload TypeScript coverage to Codecov
        if: needs.typescript.result == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/coverage-typescript
          flags: typescript
          fail_ci_if_error: false

      - name: Upload Go coverage to Codecov
        if: needs.go.result == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-go/coverage.out
          flags: go
          disable_search: true
          fail_ci_if_error: false

      - name: Upload Python coverage to Codecov
        if: needs.python.result == 'success'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-python/coverage.xml
          flags: python
          disable_search: true
          fail_ci_if_error: false

  status:
    name: Test status
    needs:
      - smoke
      - changes
      - style
      - typescript
      - go
      - python
      - docs
      - postgres
      - helm
      - infra
      - e2e
      - releaseConfig
      - coverage
    if: always() && github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in '${{ needs.smoke.result }}' '${{ needs.changes.result }}' '${{ needs.style.result }}' '${{ needs.typescript.result }}' '${{ needs.go.result }}' '${{ needs.python.result }}' '${{ needs.docs.result }}' '${{ needs.postgres.result }}' '${{ needs.helm.result }}' '${{ needs.infra.result }}' '${{ needs.e2e.result }}' '${{ needs.releaseConfig.result }}' '${{ needs.coverage.result }}'; do
