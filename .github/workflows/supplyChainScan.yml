# Weekly OSV-Scanner sweep of all dependency ecosystems with results in code scanning.

name: Supply-chain vulnerability scan

on:
  schedule:
    - cron: '41 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: OSV-Scanner
    if: github.repository == 'Garudex-Labs/caracal'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --config=osv-scanner.toml
        --recursive
        ./
