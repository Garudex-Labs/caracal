#
# Release pipeline: build CLI binaries, push runtime images to GHCR, publish GitHub Release on v* tags.

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  cli:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Stamp version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          printf '%s\n' \
            '// Copyright (C) 2026 Garudex Labs.  All Rights Reserved.' \
            '// Caracal, a product of Garudex Labs' \
            '//' \
            '// CLI version constant; CI rewrites this from the release tag before bun --compile.' \
            '' \
            "export const CARACAL_VERSION = '${VERSION}'" \
            > apps/cli/src/runtime/version.ts
          jq --arg v "${VERSION}" '.version = $v' apps/cli/package.json > apps/cli/package.json.new
          mv apps/cli/package.json.new apps/cli/package.json
      - run: pnpm --dir apps/cli build
      - run: pnpm --dir apps/tui build
      - name: Stage artifacts
        run: |
          mkdir -p release-dist
          cp apps/cli/dist/caracal-* release-dist/
          cp apps/tui/dist/caracal-tui-* release-dist/
      - name: Generate checksums
        working-directory: release-dist
        run: sha256sum caracal-* caracal-tui-* > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-binaries
          path: release-dist/*

  images:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
          - name: sts
            context: .
            dockerfile: services/sts/Dockerfile
          - name: gateway
            context: .
            dockerfile: services/gateway/Dockerfile
          - name: audit
            context: .
            dockerfile: services/audit/Dockerfile
          - name: coordinator
            context: .
            dockerfile: apps/agent-coordinator/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  publish:
    needs: [cli, images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-binaries
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/caracal-*
            dist/SHA256SUMS
            install.sh
            install.ps1
