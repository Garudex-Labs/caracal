# Caracal, a product of Garudex Labs
#
# Unified release pipeline for rc and stable Caracal artifacts.

name: release
run-name: Caracal ${{ inputs.releaseVersion }} ${{ inputs.dryRun && 'dry-run' || 'publish' }} ${{ inputs.sourceSha }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build; empty = workflow ref'
        required: false
        default: ''
        type: string
      releaseVersion:
        description: 'Release tag to dry-run, such as v0.2.0-rc.1'
        required: true
        type: string
      sourceSha:
        description: 'Exact full source commit to build and verify'
        required: true
        type: string
      dryRun:
        description: 'Build and validate without publishing'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.releaseVersion }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'
  BUN_VERSION: '1.3.14'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.14'
  GOTOOLCHAIN: auto
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  context:
    name: Release context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    outputs:
      checkoutRef: ${{ steps.resolve.outputs.checkoutRef }}
      releaseTag: ${{ steps.resolve.outputs.releaseTag }}
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
      publish: ${{ steps.resolve.outputs.publish }}
      dryRun: ${{ steps.resolve.outputs.dryRun }}
      promoteStable: ${{ steps.resolve.outputs.promoteStable }}
      sha: ${{ steps.resolve.outputs.sha }}
      serviceContainers: ${{ steps.containers.outputs.service }}
      containerNames: ${{ steps.containers.outputs.names }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch default branch
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          git fetch --no-tags origin "${default_branch}:refs/remotes/origin/${default_branch}"
          if [[ "$(git branch --show-current)" != "$default_branch" ]]; then
            git branch --force "$default_branch" "origin/${default_branch}"
          fi

      - name: Authorize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          actor="${RELEASE_ACTOR}"
          maintainers="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/MAINTAINERS?ref=${{ github.event.repository.default_branch }}" --jq '.content' | base64 -d > "$maintainers"
          if ! grep -Eo '@[[:alnum:]_-]+' "$maintainers" | sed 's/^@//' | grep -qiFx "$actor"; then
            echo "::error::$actor is not listed in .github/MAINTAINERS on ${{ github.event.repository.default_branch }} and cannot run releases."
            exit 1
          fi

      - name: Require green tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          runs_api="repos/${GITHUB_REPOSITORY}/actions/workflows/test.yml/runs"
          deadline=$(( $(date +%s) + 3600 ))
          grace=$(( $(date +%s) + 600 ))
          while :; do
            success="$(gh api "${runs_api}?head_sha=${sha}&status=success&per_page=1" --jq '.total_count')"
            if [ "$success" -gt 0 ]; then
              echo "Test workflow is green for ${sha}."
              break
            fi
            total="$(gh api "${runs_api}?head_sha=${sha}&per_page=1" --jq '.total_count')"
            pending="$(gh api "${runs_api}?head_sha=${sha}&per_page=30" --jq '[.workflow_runs[] | select(.status != "completed")] | length')"
            now="$(date +%s)"
            if [ "$total" -eq 0 ]; then
              if [ "$now" -ge "$grace" ]; then
                echo "::error::No test workflow run exists for ${sha}. Push the release commit to main and let CI start before releasing."
                exit 1
              fi
            elif [ "$pending" -eq 0 ]; then
              echo "::error::The test workflow completed without success for ${sha}. Fix CI before releasing."
              exit 1
            fi
            if [ "$now" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for a green test workflow run for ${sha}."
              exit 1
            fi
            echo "Waiting for the test workflow on ${sha} (pending runs: ${pending})..."
            sleep 30
          done

      - name: Resolve container set
        id: containers
        run: |
          set -euo pipefail
          {
            echo "service=$(jq -c '[.product.containers[] | select(.name != "runtime") | {name, context, dockerfile}]' release.config.json)"
            echo "names=$(jq -c '[.product.containers[].name]' release.config.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release context
        id: resolve
        env:
          DISPATCH_REF: ${{ github.event.inputs.ref }}
          DISPATCH_RELEASE: ${{ github.event.inputs.releaseVersion }}
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dryRun }}
          DISPATCH_SOURCE_SHA: ${{ github.event.inputs.sourceSha }}
        run: |
          set -euo pipefail
          checkout_ref="${DISPATCH_REF:-${GITHUB_REF}}"
          if [ -z "$DISPATCH_RELEASE" ]; then
            echo "::error::workflow_dispatch requires releaseVersion."
            exit 1
          fi
          release_tag="$DISPATCH_RELEASE"
          if ! echo "$release_tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$'; then
            echo "::error::Release tag '${release_tag}' must match vX.Y.Z, vX.Y.Z-rc.<number>, or vX.Y.Z-rc.sha<gitsha>."
            exit 1
          fi
          if [[ ! "$DISPATCH_SOURCE_SHA" =~ ^[0-9a-f]{40}$ || "$(git rev-parse HEAD)" != "$DISPATCH_SOURCE_SHA" ]]; then
            echo "::error::sourceSha must be the exact commit checked out for this release run."
            exit 1
          fi
          if [ "$DISPATCH_DRY_RUN" = true ]; then
            publish=false
            dry_run=true
            if [[ "$checkout_ref" != "$DISPATCH_SOURCE_SHA" ]]; then
              echo "::error::Dry runs must check out the exact source SHA."
              exit 1
            fi
          else
            publish=true
            dry_run=false
            if [[ "$checkout_ref" != "refs/tags/$release_tag" || "$GITHUB_REF" != "refs/tags/$release_tag" ]]; then
              echo "::error::Publication requires workflow ref and input ref refs/tags/$release_tag."
              exit 1
            fi
          fi
          channel="stable"
          promote_stable="$publish"
          if [[ "$release_tag" == *"-rc."* ]]; then
            channel="rc"
            promote_stable="false"
          fi
          {
            echo "checkoutRef=${checkout_ref}"
            echo "releaseTag=${release_tag}"
            echo "version=${release_tag#v}"
            echo "channel=${channel}"
            echo "publish=${publish}"
            echo "dryRun=${dry_run}"
            echo "promoteStable=${promote_stable}"
            echo "sha=${DISPATCH_SOURCE_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify immutable release tag set
        if: steps.resolve.outputs.publish == 'true'
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.releaseTag }}
          RELEASE_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          node scripts/releaseTags.mjs "$RELEASE_TAG" "$RELEASE_SHA"

      - name: Require successful release dry run
        if: steps.resolve.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.releaseTag }}
          RELEASE_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          title="Caracal ${RELEASE_TAG} dry-run ${RELEASE_SHA}"
          count="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?event=workflow_dispatch&status=success&per_page=100" \
            --jq "[.workflow_runs[] | select(.display_title == \"${title}\" and .head_branch == \"${RELEASE_TAG}\" and .head_sha == \"${RELEASE_SHA}\")] | length")"
          if [ "$count" -eq 0 ]; then
            echo "::error::No successful ${title} workflow exists for ${RELEASE_SHA}."
            exit 1
          fi

      - name: Verify clean source checkout
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)" || {
            echo "::error::Release source checkout is dirty."
            git status --short
            exit 1
          }

      - name: Validate release manifest
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.releaseTag }}
        run: |
          set -euo pipefail
          manifest="releases/${RELEASE_TAG}/manifest.json"
          test -f "$manifest" || { echo "::error::Missing release manifest: $manifest"; exit 1; }
          CARACAL_VALIDATE_HELM_FILES=1 node scripts/validateReleaseManifest.mjs --product-version "$manifest"

      - name: Validate stable documentation version
        if: steps.resolve.outputs.channel == 'stable'
        env:
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/docsVersion.mjs verify
          expected="v$(echo "$RELEASE_VERSION" | cut -d. -f1,2)"
          current="$(jq -r '.current' docs/versions.json)"
          if [ "$current" != "$expected" ]; then
            echo "::error::Stable ${RELEASE_VERSION} requires the ${expected} documentation snapshot; current is ${current}."
            exit 1
          fi

      - name: Verify stable promotion source
        if: steps.resolve.outputs.channel == 'stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.releaseTag }}
        run: |
          set -euo pipefail
          manifest="releases/${RELEASE_TAG}/manifest.json"
          from="$(jq -r '.promotedFrom' "$manifest")"
          node scripts/verifyReleasePromotion.mjs "$from" "$RELEASE_TAG"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Stamp drift
        run: node scripts/release.mjs stamp --check

  archives:
    name: Build archives
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript
        run: pnpm run build:typescript

      - name: Stamp runtime
        env:
          CARACAL_RELEASE_VERSION: ${{ needs.context.outputs.version }}
          CARACAL_DEV_SHA: ${{ needs.context.outputs.sha }}
        run: |
          set -euo pipefail
          node apps/runtime/scripts/stampVersion.mjs
          jq --arg v "$CARACAL_RELEASE_VERSION" '.version = $v' apps/runtime/package.json > apps/runtime/package.json.tmp
          mv apps/runtime/package.json.tmp apps/runtime/package.json

      - name: Build runtime
        env:
          CARACAL_RELEASE_VERSION: ${{ needs.context.outputs.version }}
          CARACAL_DEV_SHA: ${{ needs.context.outputs.sha }}
        run: pnpm --dir apps/runtime build

      - name: Package archives
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          source_date_epoch="$(git log -1 --format=%ct)"
          targets='runtime:linux:amd64:x64 runtime:linux:arm64:arm64 runtime:darwin:amd64:x64 runtime:darwin:arm64:arm64 runtime:windows:amd64:x64'
          for entry in $targets; do
            IFS=: read -r kind os arch bunArch <<EOF
          ${entry}
          EOF
            ext=''
            [ "$os" = windows ] && ext='.exe'
            case "$kind" in
              runtime) srcDir=apps/runtime/dist; srcBase=caracal; binName=caracal ;;
            esac
            src="${srcDir}/${srcBase}-${os}-${bunArch}${ext}"
            [ -f "$src" ] || { echo "::error::missing source binary: ${src}"; exit 1; }
            stage="$(mktemp -d)"
            cp "$src" "${stage}/${binName}${ext}"
            chmod +x "${stage}/${binName}${ext}" 2>/dev/null || true
            touch -d "@${source_date_epoch}" "${stage}/${binName}${ext}"
            name="caracal-${kind}-${os}-${arch}-${RELEASE_TAG}"
            if [ "$os" = windows ]; then
              (cd "$stage" && TZ=UTC zip -X -q "${name}.zip" "${binName}${ext}")
              mv "${stage}/${name}.zip" release-dist/
            else
              tar --sort=name --owner=0 --group=0 --numeric-owner --mtime="@${source_date_epoch}" -C "$stage" -cf - "${binName}" | gzip -n -9 > "release-dist/${name}.tar.gz"
            fi
            rm -rf "$stage"
          done
          source_timestamp="$(git show -s --format=%cI "${{ needs.context.outputs.sha }}")"
          node scripts/finalizeReleaseManifest.mjs \
            "releases/${RELEASE_TAG}/manifest.json" \
            release-dist/manifest.json \
            "${{ needs.context.outputs.sha }}" \
            "$source_timestamp"
          CARACAL_EXPECT_SOURCE_SHA="${{ needs.context.outputs.sha }}" \
            node scripts/validateReleaseManifest.mjs release-dist/manifest.json
          cp install.sh install.ps1 release-dist/
          ls -la release-dist/

      - name: Verify reproducibility
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          source_date_epoch="$(git log -1 --format=%ct)"
          for entry in runtime:apps/runtime/dist:caracal; do
            IFS=: read -r kind srcDir binName <<EOF
          ${entry}
          EOF
            src="${srcDir}/${binName}-linux-x64"
            stage="$(mktemp -d)"
            cp "$src" "${stage}/${binName}"
            chmod +x "${stage}/${binName}"
            touch -d "@${source_date_epoch}" "${stage}/${binName}"
            archive="${stage}/caracal-${kind}-linux-amd64-${RELEASE_TAG}.tar.gz"
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime="@${source_date_epoch}" -C "$stage" -cf - "${binName}" | gzip -n -9 > "$archive"
            cmp "$archive" "release-dist/caracal-${kind}-linux-amd64-${RELEASE_TAG}.tar.gz"
            rm -rf "$stage"
          done

      - name: Smoke test archives
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          tar -xzf "release-dist/caracal-runtime-linux-amd64-${RELEASE_TAG}.tar.gz" -C "$work"
          "${work}/caracal" --help

      - name: Generate checksums
        working-directory: release-dist
        run: sha256sum caracal-runtime-*.tar.gz caracal-runtime-*.zip manifest.json install.sh install.ps1 > SHA256SUMS

      - name: Verify assets
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
        run: node scripts/verifyReleaseAssets.mjs "$RELEASE_TAG" release-dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-archives
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: needs.context.outputs.publish == 'true'
        with:
          subject-path: |
            release-dist/caracal-runtime-*

  serviceImages:
    name: Build service images
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.context.outputs.serviceContainers) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: needs.context.outputs.publish == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check source image
        id: state
        if: needs.context.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          reference="${REGISTRY}/${IMAGE_OWNER}/caracal-${{ matrix.name }}:sha-${{ needs.context.outputs.sha }}"
          set +e
          output="$(docker buildx imagetools inspect "$reference" 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            if gh attestation verify "oci://$reference" --repo Garudex-Labs/caracal --format json > provenance.json 2>/dev/null && \
              jq -e --arg sha "${{ needs.context.outputs.sha }}" --arg ref "refs/tags/${{ needs.context.outputs.releaseTag }}" \
                'any(.[]; .verificationResult.signature.certificate.sourceRepositoryDigest == $sha and .verificationResult.signature.certificate.sourceRepositoryRef == $ref)' \
                provenance.json >/dev/null; then
              echo 'published=true' >> "$GITHUB_OUTPUT"
            else
              echo "::error::$reference exists without exact release provenance."
              exit 1
            fi
          elif grep -qi 'not found' <<< "$output"; then
            echo 'published=false' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit "$status"
          fi

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          tags: type=raw,value=sha-${{ needs.context.outputs.sha }}

      - id: push
        if: needs.context.outputs.publish != 'true' || steps.state.outputs.published != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.context.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.context.outputs.releaseTag }}
            org.opencontainers.image.revision=${{ needs.context.outputs.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: needs.context.outputs.publish == 'true' && steps.state.outputs.published != 'true'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  runtimeImage:
    name: Build runtime image
    needs: context
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: needs.context.outputs.publish == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check source image
        id: state
        if: needs.context.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          reference="${REGISTRY}/${IMAGE_OWNER}/caracal-runtime:sha-${{ needs.context.outputs.sha }}"
          set +e
          output="$(docker buildx imagetools inspect "$reference" 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            if gh attestation verify "oci://$reference" --repo Garudex-Labs/caracal --format json > provenance.json 2>/dev/null && \
              jq -e --arg sha "${{ needs.context.outputs.sha }}" --arg ref "refs/tags/${{ needs.context.outputs.releaseTag }}" \
                'any(.[]; .verificationResult.signature.certificate.sourceRepositoryDigest == $sha and .verificationResult.signature.certificate.sourceRepositoryRef == $ref)' \
                provenance.json >/dev/null; then
              echo 'published=true' >> "$GITHUB_OUTPUT"
            else
              echo "::error::$reference exists without exact release provenance."
              exit 1
            fi
          elif grep -qi 'not found' <<< "$output"; then
            echo 'published=false' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit "$status"
          fi

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-runtime
          tags: type=raw,value=sha-${{ needs.context.outputs.sha }}

      - id: push
        if: needs.context.outputs.publish != 'true' || steps.state.outputs.published != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            CARACAL_RELEASE_VERSION=${{ needs.context.outputs.version }}
            CARACAL_DEV_SHA=${{ needs.context.outputs.sha }}
          push: ${{ needs.context.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.context.outputs.releaseTag }}
            org.opencontainers.image.revision=${{ needs.context.outputs.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: needs.context.outputs.publish == 'true' && steps.state.outputs.published != 'true'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-runtime
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  verifyPublishedOci:
    name: Publish verified OCI images
    needs: [context, serviceImages, runtimeImage]
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        if: needs.context.outputs.publish == 'true'

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: needs.context.outputs.publish == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote verified images
        if: needs.context.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publishOciRelease.mjs "${{ needs.context.outputs.sha }}" "${{ needs.context.outputs.releaseTag }}"

  verifyAssets:
    name: Verify assets
    needs: [context, archives, verifyPublishedOci, helmChart]
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-archives
          path: dist

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        if: needs.context.outputs.publish == 'true'

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: needs.context.outputs.publish == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Record immutable image digests
        if: needs.context.outputs.publish == 'true'
        run: |
          set -euo pipefail
          node scripts/finalizeOciDigests.mjs dist/manifest.json
          (cd dist && sha256sum caracal-runtime-*.tar.gz caracal-runtime-*.zip manifest.json install.sh install.ps1 > SHA256SUMS)

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.context.outputs.sha }}
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
          PUBLISH: ${{ needs.context.outputs.publish }}
        run: |
          set -euo pipefail
          CARACAL_EXPECT_SOURCE_SHA="$RELEASE_SHA" node scripts/validateReleaseManifest.mjs dist/manifest.json
          if [ "$PUBLISH" = true ]; then
            CARACAL_EXPECT_SOURCE_SHA="$RELEASE_SHA" node scripts/validateReleaseManifest.mjs --image-digests dist/manifest.json
          fi
          node scripts/verifyReleaseAssets.mjs "${{ needs.context.outputs.releaseTag }}" dist
          if [ "$PUBLISH" = true ]; then
            for archive in dist/caracal-runtime-*; do
              gh attestation verify "$archive" --repo Garudex-Labs/caracal --format json > provenance.json
              jq -e \
                --arg sha "$RELEASE_SHA" \
                --arg ref "refs/tags/$RELEASE_TAG" \
                'any(.[]; .verificationResult.signature.certificate.sourceRepositoryDigest == $sha and .verificationResult.signature.certificate.sourceRepositoryRef == $ref)' \
                provenance.json >/dev/null
            done
          fi

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: needs.context.outputs.publish == 'true'
        with:
          subject-path: dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  helmChart:
    name: Publish Helm chart
    needs: [context, verifyPublishedOci]
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - name: Log in to GHCR
        if: needs.context.outputs.publish == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" --username "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: helm package infra/helm/caracal --destination chart-dist

      - name: Check published chart
        id: state
        if: needs.context.outputs.publish == 'true'
        run: |
          set -euo pipefail
          set +e
          output="$(helm show chart "oci://${REGISTRY}/${IMAGE_OWNER}/charts/caracal" --version "${{ needs.context.outputs.version }}" 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'published=true' >> "$GITHUB_OUTPUT"
          elif grep -qi 'not found' <<< "$output"; then
            echo 'published=false' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit "$status"
          fi

      - name: Attest chart source
        if: needs.context.outputs.publish == 'true' && steps.state.outputs.published != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: chart-dist/caracal-*.tgz

      - name: Push chart
        if: needs.context.outputs.publish == 'true' && steps.state.outputs.published != 'true'
        run: helm push chart-dist/caracal-*.tgz "oci://${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/charts"

      - name: Verify published chart
        if: needs.context.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p chart-published
          helm pull "oci://${REGISTRY}/${IMAGE_OWNER}/charts/caracal" --version "${{ needs.context.outputs.version }}" --destination chart-published
          cmp chart-dist/caracal-*.tgz chart-published/caracal-*.tgz
          gh attestation verify chart-published/caracal-*.tgz --repo Garudex-Labs/caracal --format json > chart-provenance.json
          jq -e \
            --arg sha "${{ needs.context.outputs.sha }}" \
            --arg ref "refs/tags/${{ needs.context.outputs.releaseTag }}" \
            'any(.[]; .verificationResult.signature.certificate.sourceRepositoryDigest == $sha and .verificationResult.signature.certificate.sourceRepositoryRef == $ref)' \
            chart-provenance.json >/dev/null

  publishNpmPackages:
    name: Publish npm packages
    needs: [context, verifyAssets, verifyPublishedOci]
    if: github.repository == 'Garudex-Labs/caracal'
    uses: ./.github/workflows/publishNpm.yml
    with:
      package: all
      dryRun: ${{ needs.context.outputs.dryRun == 'true' }}
      runner: ubuntu-24.04
      releaseSha: ${{ needs.context.outputs.sha }}
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  publishPypiPackages:
    name: Publish PyPI packages
    needs: [context, verifyAssets, verifyPublishedOci]
    if: github.repository == 'Garudex-Labs/caracal'
    uses: ./.github/workflows/publishPypi.yml
    with:
      package: all
      dryRun: ${{ needs.context.outputs.dryRun == 'true' }}
      runner: ubuntu-24.04
      releaseSha: ${{ needs.context.outputs.sha }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    secrets: inherit

  githubRelease:
    name: Publish GitHub Release
    needs: [context, publishNpmPackages, publishPypiPackages, helmChart]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ needs.context.outputs.channel == 'rc' && 'rc-release' || 'release-approval' }}
      url: https://github.com/${{ github.repository }}/releases/tag/${{ needs.context.outputs.releaseTag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Check published GitHub Release
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
          RELEASE_CHANNEL: ${{ needs.context.outputs.channel }}
        run: |
          set -euo pipefail
          error_file="$(mktemp)"
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > release.json 2>"$error_file"; then
            node scripts/verifyGitHubRelease.mjs file --tag "$RELEASE_TAG" --channel "$RELEASE_CHANNEL" --path release.json
            mkdir existing
            gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir existing
            diff -u <(find dist -maxdepth 1 -type f -printf '%f\n' | sort) <(find existing -maxdepth 1 -type f -printf '%f\n' | sort)
            for asset in dist/*; do
              cmp "$asset" "existing/$(basename "$asset")"
            done
            echo 'published=true' >> "$GITHUB_OUTPUT"
          elif grep -q 'HTTP 404' "$error_file"; then
            echo 'published=false' >> "$GITHUB_OUTPUT"
          else
            cat "$error_file" >&2
            exit 1
          fi

      - name: Publish release candidate
        if: needs.context.outputs.channel == 'rc' && steps.state.outputs.published != 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.context.outputs.releaseTag }}
          generate_release_notes: true
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            dist/caracal-runtime-*
            dist/manifest.json
            dist/SHA256SUMS
            dist/install.sh
            dist/install.ps1

      - name: Publish stable release
        if: needs.context.outputs.channel == 'stable' && steps.state.outputs.published != 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.context.outputs.releaseTag }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/caracal-runtime-*
            dist/manifest.json
            dist/SHA256SUMS
            dist/install.sh
            dist/install.ps1

      - name: Verify release classification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
          RELEASE_CHANNEL: ${{ needs.context.outputs.channel }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > release.json
          node scripts/verifyGitHubRelease.mjs file --tag "$RELEASE_TAG" --channel "$RELEASE_CHANNEL" --path release.json

  postPublish:
    name: Validate public release
    needs: [context, githubRelease]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.context.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
          RELEASE_SHA: ${{ needs.context.outputs.sha }}
          RELEASE_CHANNEL: ${{ needs.context.outputs.channel }}
        run: |
          set -euo pipefail
          node scripts/verifyGitHubRelease.mjs public \
            --tag "$RELEASE_TAG" \
            --channel "$RELEASE_CHANNEL" \
            --url "https://api.github.com/repos/Garudex-Labs/caracal/releases/tags/${RELEASE_TAG}"
          mkdir published
          gh release download "$RELEASE_TAG" --repo Garudex-Labs/caracal --dir published
          (cd published && sha256sum --check SHA256SUMS)
          CARACAL_EXPECT_SOURCE_SHA="$RELEASE_SHA" node scripts/validateReleaseManifest.mjs --image-digests published/manifest.json
          node scripts/verifyOciDigests.mjs published/manifest.json
          node scripts/verifyReleaseAssets.mjs "$RELEASE_TAG" published
          for asset in published/*; do
            gh attestation verify "$asset" --repo Garudex-Labs/caracal --format json > provenance.json
            jq -e \
              --arg sha "$RELEASE_SHA" \
              --arg ref "refs/tags/$RELEASE_TAG" \
              'any(.[]; .verificationResult.signature.certificate.sourceRepositoryDigest == $sha and .verificationResult.signature.certificate.sourceRepositoryRef == $ref)' \
              provenance.json >/dev/null
          done
          git fetch --force --tags origin
          node scripts/releaseTags.mjs "$RELEASE_TAG" "$RELEASE_SHA"

  dryRunSummary:
    name: Dry-run summary
    needs: [context, publishNpmPackages, publishPypiPackages]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.dryRun == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - run: |
          {
            echo "## Release dry-run"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Release | \`${{ needs.context.outputs.releaseTag }}\` |"
            echo "| Channel | \`${{ needs.context.outputs.channel }}\` |"
            echo "| Published | \`false\` |"
            echo ""
            echo "Built and verified assets. Publishing, validation, and promotion were skipped."
          } >> "$GITHUB_STEP_SUMMARY"

  promoteStable:
    name: Promote stable tags
    needs: [context, postPublish]
    if: github.repository == 'Garudex-Labs/caracal' && needs.context.outputs.promoteStable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote images
        env:
          RELEASE_TAG: ${{ needs.context.outputs.releaseTag }}
          CONTAINER_NAMES: ${{ needs.context.outputs.containerNames }}
        run: |
          set -euo pipefail
          series="$(echo "$RELEASE_TAG" | sed -E 's/^(v[0-9]+\.[0-9]+)\..*$/\1/')"
          for name in $(jq -r '.[]' <<< "$CONTAINER_NAMES"); do
            image="${REGISTRY}/${IMAGE_OWNER}/caracal-${name}"
            docker buildx imagetools create \
              -t "${image}:${series}" \
              -t "${image}:latest" \
              "${image}:${RELEASE_TAG}"
          done
