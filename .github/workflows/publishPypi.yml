#
# Publishes selected Python packages to PyPI from a protected CI environment.

name: publishPypi
run-name: Caracal PyPI ${{ inputs.releaseTag != '' && inputs.releaseTag || github.ref_name }} ${{ inputs.dryRun && 'dry-run' || 'publish' }}

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Packages to publish.'
        required: true
        default: all
        type: choice
        options:
          - all
          - core
          - oauth
          - admin
          - identity
          - revocation
          - sdk
          - verify
          - fastmcp
          - redis
          - asgi
      dryRun:
        description: 'Build only.'
        required: false
        default: true
        type: boolean
      runner:
        description: 'Publish runner.'
        required: true
        default: ubuntu-24.04
        type: choice
        options:
          - ubuntu-24.04
          - macos-15
          - windows-2022
      releaseTag:
        description: 'Release tag whose packages are being published.'
        required: false
        default: ''
        type: string
      releaseSha:
        description: 'Exact release source commit.'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      package:
        description: 'Packages to publish.'
        required: true
        type: string
      dryRun:
        description: 'Build only.'
        required: false
        default: false
        type: boolean
      runner:
        description: 'Publish runner.'
        required: true
        type: string
      releaseSha:
        description: 'Exact release commit supplied by release.yml.'
        required: true
        type: string
      releaseTag:
        description: 'Exact release tag supplied by release.yml.'
        required: true
        type: string
permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: publish-pypi-${{ inputs.releaseTag != '' && inputs.releaseTag || github.ref }}-${{ inputs.package }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.14'

jobs:
  select:
    name: Select packages
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      preflightMatrix: ${{ steps.matrix.outputs.preflightMatrix }}
      hasPackages: ${{ steps.matrix.outputs.hasPackages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.releaseSha != '' && inputs.releaseSha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate dispatch ref and actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_DRY_RUN: ${{ inputs.dryRun }}
          RELEASE_SHA: ${{ inputs.releaseSha }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          RELEASE_ACTOR: ${{ github.actor }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "$DEFAULT_BRANCH" && ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$ ]]; then
            echo "::error::PyPI publishing must run from ${DEFAULT_BRANCH} or a Caracal release tag."
            exit 1
          fi
          if [[ -z "$RELEASE_TAG" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$ ]]; then
            echo "::error::Invalid Caracal release tag: $RELEASE_TAG"
            exit 1
          fi
          if [[ "$PUBLISH_DRY_RUN" != true && ( ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ || "$(git rev-parse HEAD)" != "$RELEASE_SHA" ) ]]; then
            echo "::error::PyPI publication requires the exact release commit."
            exit 1
          fi
          if [[ "$PUBLISH_DRY_RUN" != true ]]; then
            git fetch --force --tags origin
            node scripts/releaseTags.mjs "$RELEASE_TAG" "$RELEASE_SHA"
          fi
          node scripts/authorizeReleaseActor.mjs --actor "$RELEASE_ACTOR" --branch "$DEFAULT_BRANCH" --allow-github-bot

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: matrix
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          PUBLISH_DRY_RUN: ${{ inputs.dryRun }}
          PUBLISH_RUNNER: ${{ inputs.runner }}
        run: |
          set -euo pipefail
          args=(--ecosystem pypi --format github-matrix)
          if [[ "$PACKAGE" != 'all' ]]; then
            args+=(--package "$PACKAGE")
          fi
          selected="$(node scripts/releasePlan.mjs "${args[@]}")"
          hasPackages="$(node -e "const m = JSON.parse(process.argv[1]); console.log(m.include.length > 0 ? 'true' : 'false')" "$selected")"
          if [[ "$PUBLISH_DRY_RUN" == true ]]; then
            runners='["ubuntu-24.04", "macos-15", "windows-2022"]'
          else
            runners="[\"$PUBLISH_RUNNER\"]"
          fi
          preflight="$(RUNNERS="$runners" node -e "const m = JSON.parse(process.argv[1]); const os = JSON.parse(process.env.RUNNERS); console.log(JSON.stringify({ include: m.include.flatMap((pkg) => os.map((runner) => ({ ...pkg, runner }))) }));" "$selected")"
          {
            echo 'matrix<<JSON'
            printf '%s\n' "$selected"
            echo JSON
            echo 'preflightMatrix<<JSON'
            printf '%s\n' "$preflight"
            echo JSON
            echo "hasPackages=$hasPackages"
          } >> "$GITHUB_OUTPUT"

  preflight:
    name: Check ${{ matrix.name }} on ${{ matrix.runner }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true'
    needs: select
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.preflightMatrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.releaseSha != '' && inputs.releaseSha || github.sha }}
          persist-credentials: false

      - name: Check out publication tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: .release-tools
          persist-credentials: false

      - name: Verify source checkout
        if: inputs.releaseSha != ''
        run: test "$(git rev-parse HEAD)" = "${{ inputs.releaseSha }}"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build distribution
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Dev version blocked: ${ver}"
            exit 1
          fi
          python -m pip install --require-hashes --requirement "$GITHUB_WORKSPACE/scripts/publishPypiRequirements.lock"
          python -m py_compile "$GITHUB_WORKSPACE/.release-tools/scripts/verifyPypiRelease.py"
          pypi-attestations --version
          rm -rf dist build ./*.egg-info
          python -m build
          python -m twine check dist/*

  publish:
    name: Publish ${{ matrix.name }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true' && inputs.dryRun != true
    needs: [select, preflight]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.name }}
    permissions:
      artifact-metadata: write
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.releaseSha != '' && inputs.releaseSha || github.sha }}
          persist-credentials: false

      - name: Check out publication tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: .release-tools
          persist-credentials: false

      - name: Verify source checkout
        run: test "$(git rev-parse HEAD)" = "${{ inputs.releaseSha }}"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install publication tools
        run: |
          set -euo pipefail
          python -m pip install --require-hashes --requirement "$GITHUB_WORKSPACE/scripts/publishPypiRequirements.lock"
          python -m py_compile "$GITHUB_WORKSPACE/.release-tools/scripts/verifyPypiRelease.py"
          pypi-attestations --version

      - name: Check published package
        id: state
        working-directory: ${{ matrix.dir }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ inputs.releaseSha }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          set -euo pipefail
          name="$(awk -F'"' '/^name = /{print $2; exit}' pyproject.toml)"
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          state="$(python - "$name" "$ver" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          name, version = sys.argv[1:]
          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{name}/{version}/json", timeout=30):
                  print("published")
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
              print("missing")
          PY
          )"
          if [ "$state" = published ]; then
            python "$GITHUB_WORKSPACE/.release-tools/scripts/verifyPypiRelease.py" "$name" "$ver" "$RELEASE_SHA" "$RELEASE_TAG"
            echo 'published=true' >> "$GITHUB_OUTPUT"
          else
            echo 'published=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build distribution
        if: steps.state.outputs.published != 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Dev version blocked: ${ver}"
            exit 1
          fi
          rm -rf dist build ./*.egg-info
          python -m build
          python -m twine check dist/*

      - name: Attest distribution source
        if: steps.state.outputs.published != 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ matrix.dir }}/dist/*
          predicate-type: https://caracal.run/attestations/release-source/v1
          predicate: |
            {
              "sourceRepositoryURI": "https://github.com/Garudex-Labs/caracal",
              "sourceRepositoryDigest": "${{ inputs.releaseSha }}",
              "sourceRepositoryRef": "refs/tags/${{ inputs.releaseTag }}"
            }

      - name: Publish package
        if: steps.state.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ${{ matrix.dir }}/dist
          skip-existing: false
          attestations: true

      - name: Verify published package
        if: inputs.dryRun != true
        working-directory: ${{ matrix.dir }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ inputs.releaseSha }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          set -euo pipefail
          name="$(awk -F'"' '/^name = /{print $2; exit}' pyproject.toml)"
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          python "$GITHUB_WORKSPACE/.release-tools/scripts/verifyPypiRelease.py" "$name" "$ver" "$RELEASE_SHA" "$RELEASE_TAG"

      - name: Dry-run summary
        if: inputs.dryRun == true
        working-directory: ${{ matrix.dir }}
        run: |
          name="$(awk -F'"' '/^name = /{print $2; exit}' pyproject.toml)"
          ver="$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)"
          echo "Validated PyPI package ${name}==${ver} without publishing."
