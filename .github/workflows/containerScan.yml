#
# Weekly Trivy scan of published container images for Critical and High CVEs.

name: Container image scan

on:
  schedule:
    - cron: '51 6 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to scan; empty resolves the latest release.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: garudex-labs

jobs:
  resolveTag:
    name: Resolve image tag
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      images: ${{ steps.images.outputs.images }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          else
            tag="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq '.tagName' 2>/dev/null || true)"
          fi
          if [ -n "${tag}" ] && ! printf '%s' "${tag}" | grep -Eq '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-rc\.[0-9]+)?$'; then
            echo "::error::Tag ${tag} is not a Caracal release tag."
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if [ -z "${tag}" ]; then
            echo "::notice::No release tag resolved; image scan will be skipped."
          else
            echo "::notice::Scanning images at tag ${tag}."
          fi

      # The image list must come from the resolved release's own record, not the current
      # release.config.json: the container topology changes between releases, and images
      # only exist in the registry under the tags their release actually published.
      - id: images
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "images=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          manifest="releases/${RELEASE_TAG}/manifest.json"
          if [ ! -f "${manifest}" ]; then
            echo "::error::No release record at ${manifest}; cannot derive the image list for ${RELEASE_TAG}."
            exit 1
          fi
          echo "images=$(jq -c '[(.containers | keys[]), (if .runtimeImage then "runtime" else empty end)]' "${manifest}")" >> "$GITHUB_OUTPUT"

  scan:
    name: Scan ${{ matrix.image }}
    needs: resolveTag
    if: github.repository == 'Garudex-Labs/caracal' && needs.resolveTag.outputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.resolveTag.outputs.images) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/caracal-${{ matrix.image }}:${{ needs.resolveTag.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          exit-code: '0'

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
