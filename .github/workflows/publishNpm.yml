#
# Publishes selected TypeScript packages to npm from a protected CI environment.

name: publishNpm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Packages to publish.'
        required: true
        default: all
        type: choice
        options:
          - all
          - core
          - oauth
          - admin
          - identity
          - revocation
          - sdk
          - verify
          - express
          - fastmcp
          - redis
      dryRun:
        description: 'Build only.'
        required: false
        default: true
        type: boolean
      runner:
        description: 'Publish runner.'
        required: true
        default: ubuntu-24.04
        type: choice
        options:
          - ubuntu-24.04
          - macos-15
          - windows-2022
  workflow_call:
    inputs:
      package:
        description: 'Packages to publish.'
        required: true
        type: string
      dryRun:
        description: 'Build only.'
        required: false
        default: false
        type: boolean
      runner:
        description: 'Publish runner.'
        required: true
        type: string
      releaseSha:
        description: 'Exact release commit supplied by release.yml.'
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: publish-npm-${{ inputs.package }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.1.1'

jobs:
  select:
    name: Select packages
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      preflightMatrix: ${{ steps.matrix.outputs.preflightMatrix }}
      hasPackages: ${{ steps.matrix.outputs.hasPackages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.releaseSha != '' && inputs.releaseSha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate dispatch ref and actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_DRY_RUN: ${{ inputs.dryRun }}
          RELEASE_SHA: ${{ inputs.releaseSha }}
          RELEASE_ACTOR: ${{ github.actor }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "$DEFAULT_BRANCH" && ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$ ]]; then
            echo "::error::npm publishing must run from ${DEFAULT_BRANCH} or a Caracal release tag."
            exit 1
          fi
          if [[ "$PUBLISH_DRY_RUN" != true && ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.(sha[0-9A-Za-z]+|[0-9]+))?$ ]]; then
            echo "::error::npm publication requires a Caracal release tag; the default branch supports dry runs only."
            exit 1
          fi
          if [[ "$PUBLISH_DRY_RUN" != true && ( ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ || "$(git rev-parse HEAD)" != "$RELEASE_SHA" ) ]]; then
            echo "::error::npm publication must be called by release.yml with its exact release commit."
            exit 1
          fi
          node scripts/authorizeReleaseActor.mjs --actor "$RELEASE_ACTOR" --branch "$DEFAULT_BRANCH"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: matrix
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          PUBLISH_DRY_RUN: ${{ inputs.dryRun }}
          PUBLISH_RUNNER: ${{ inputs.runner }}
        run: |
          set -euo pipefail
          args=(--ecosystem npm --format github-matrix)
          if [[ "$PACKAGE" != 'all' ]]; then
            args+=(--package "$PACKAGE")
          fi
          selected="$(node scripts/releasePlan.mjs "${args[@]}")"
          hasPackages="$(node -e "const m = JSON.parse(process.argv[1]); console.log(m.include.length > 0 ? 'true' : 'false')" "$selected")"
          if [[ "$PUBLISH_DRY_RUN" == true ]]; then
            runners='["ubuntu-24.04", "macos-15", "windows-2022"]'
          else
            runners="[\"$PUBLISH_RUNNER\"]"
          fi
          preflight="$(RUNNERS="$runners" node -e "const m = JSON.parse(process.argv[1]); const os = JSON.parse(process.env.RUNNERS); console.log(JSON.stringify({ include: m.include.flatMap((pkg) => os.map((runner) => ({ ...pkg, runner }))) }));" "$selected")"
          {
            echo 'matrix<<JSON'
            printf '%s\n' "$selected"
            echo JSON
            echo 'preflightMatrix<<JSON'
            printf '%s\n' "$preflight"
            echo JSON
            echo "hasPackages=$hasPackages"
          } >> "$GITHUB_OUTPUT"

  preflight:
    name: Check ${{ matrix.name }} on ${{ matrix.runner }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true'
    needs: select
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.preflightMatrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.releaseSha != '' && inputs.releaseSha || github.sha }}
          persist-credentials: false

      - name: Verify source checkout
        if: inputs.releaseSha != ''
        run: test "$(git rev-parse HEAD)" = "${{ inputs.releaseSha }}"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        run: pnpm run build:typescript

      - name: Validate package
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Dev version blocked: ${name}@${ver}"
            exit 1
          fi
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          node - "$RUNNER_TEMP/npm-pack.json" <<'NODE'
          const { readFileSync } = require('node:fs');
          const pack = JSON.parse(readFileSync(process.argv[2], 'utf8'))[0];
          const files = new Set(pack.files.map((file) => file.path));
          if (![...files].some((file) => file.startsWith('dist/'))) {
            throw new Error('npm package missing dist/');
          }
          if (!files.has('package.json')) {
            throw new Error('npm package missing package.json');
          }
          NODE

  auth:
    name: Verify npm token
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true' && inputs.dryRun != true
    needs: select
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Verify npm scope access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm whoami >/dev/null

  publish:
    name: Publish ${{ matrix.name }}
    if: github.repository == 'Garudex-Labs/caracal' && needs.select.outputs.hasPackages == 'true' && inputs.dryRun != true
    needs: [select, preflight, auth]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ matrix.name }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.releaseSha != '' && inputs.releaseSha || github.sha }}
          persist-credentials: false

      - name: Verify source checkout
        run: test "$(git rev-parse HEAD)" = "${{ inputs.releaseSha }}"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Check published package
        id: state
        working-directory: ${{ matrix.dir }}
        env:
          RELEASE_SHA: ${{ inputs.releaseSha }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            node "$GITHUB_WORKSPACE/scripts/verifyNpmRelease.mjs" "$name" "$ver" "$RELEASE_SHA" "$GITHUB_REF_NAME"
            echo 'published=true' >> "$GITHUB_OUTPUT"
          else
            echo 'published=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.state.outputs.published != 'true'
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build TypeScript packages
        if: steps.state.outputs.published != 'true'
        run: pnpm run build:typescript

      - name: Validate package
        if: steps.state.outputs.published != 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if [[ "$ver" == *"dev.sha"* || "$ver" == *"dev."* ]]; then
            echo "::error::Dev version blocked: ${name}@${ver}"
            exit 1
          fi
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack.json"
          node - "$RUNNER_TEMP/npm-pack.json" <<'NODE'
          const { readFileSync } = require('node:fs');
          const pack = JSON.parse(readFileSync(process.argv[2], 'utf8'))[0];
          const files = new Set(pack.files.map((file) => file.path));
          if (![...files].some((file) => file.startsWith('dist/'))) {
            throw new Error('npm package missing dist/');
          }
          if (!files.has('package.json')) {
            throw new Error('npm package missing package.json');
          }
          NODE

      - name: Publish package
        if: steps.state.outputs.published != 'true'
        working-directory: ${{ matrix.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          dist_tag="latest"
          [[ "$ver" == *"-rc."* ]] && dist_tag="rc"
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "::error::${name}@${ver} is already published from another release attempt."
            exit 1
          fi
          npm publish --access public --tag "$dist_tag" --provenance

      - name: Verify published package
        if: inputs.dryRun != true
        working-directory: ${{ matrix.dir }}
        env:
          RELEASE_SHA: ${{ inputs.releaseSha }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          deadline=$((SECONDS + 300))
          attempt=0
          until [ "$(npm view "${name}@${ver}" version 2>/dev/null)" = "$ver" ]; do
            attempt=$((attempt + 1))
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::${name}@${ver} is missing from the npm registry after ${attempt} checks"
              exit 1
            fi
            sleep 15
          done
          node "$GITHUB_WORKSPACE/scripts/verifyNpmRelease.mjs" "$name" "$ver" "$RELEASE_SHA" "$GITHUB_REF_NAME"

      - name: Dry-run summary
        if: inputs.dryRun == true
        working-directory: ${{ matrix.dir }}
        run: |
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          echo "Validated npm package ${name}@${ver} without publishing."
