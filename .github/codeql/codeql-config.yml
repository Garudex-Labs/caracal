# CodeQL analysis configuration shared by all languages in the CodeQL workflow.

name: "Caracal CodeQL configuration"

queries:
  - uses: security-extended

# Test code never ships. Scanning it raises alerts about fixtures and stub
# servers (for example URL prefix matching inside mock fetch implementations
# under tests/typescript) that have no security boundary. All production
# sources under apps/, packages/, services/, control/, and infra/ stay fully
# covered.
paths-ignore:
  - tests

query-filters:
  # js/missing-rate-limiting only recognizes per-route middleware from known
  # packages such as express-rate-limit and @fastify/rate-limit. Caracal
  # enforces rate limits centrally instead: apps/api applies Redis-backed
  # per-IP and per-actor buckets to every /v1 route through global
  # onRequest/preHandler hooks (apps/api/src/app.ts), /v1/control/invoke and
  # /ready carry dedicated limiters, apps/coordinator guards its v1 and
  # invocation routes with equivalent hooks, and apps/auth uses better-auth's
  # built-in rateLimit. The query cannot model hook-based limiters, so every
  # finding it raises here is a false positive against an already rate-limited
  # handler; the behavior is asserted by the rate-limit suites under
  # tests/typescript/unit. Adding per-route middleware solely to satisfy the
  # query would duplicate the centralized control.
  - exclude:
      id: js/missing-rate-limiting
  # js/file-access-to-http is a heuristic audit query for implanted exfiltration
  # backdoors: it flags any flow from a file read into an outbound request.
  # Caracal's credential model is file-based by design: the single discovery
  # layer in packages/core/ts/src/envfile.ts reads admin, coordinator, and
  # metrics bearer tokens from Docker secrets, the managed dev-secrets
  # directory, or *_FILE env paths, and callers (the auth BFF proxy in
  # apps/auth/src/console.ts, the engine doctor probes) present them solely as
  # Authorization headers to operator-configured internal service URLs
  # (CARACAL_API_URL, CARACAL_COORDINATOR_URL), never to request-derived
  # destinations. Every finding this query raises here is that intended
  # credential presentation, and each new probe or proxy call site would
  # re-trigger it. File content flowing anywhere other than a bearer header on
  # the internal hop remains a code-review boundary in envfile.ts callers.
  - exclude:
      id: js/file-access-to-http  # js/xss-through-exception flags the TxAbort idiom in apps/api routes: a
  # handler throws TxAbort carrying reply.code(...).send({...}) and
  # withTransaction (apps/api/src/db.ts) returns that carried value from the
  # route, which the query reads as exception text flowing into a response.
  # Every payload on that path is a constant-keyed JSON object serialized by
  # Fastify as application/json, the global error handler in
  # apps/api/src/app.ts maps real exceptions to structured CaracalError JSON
  # without echoing their text, and every /v1 response carries
  # x-content-type-options: nosniff, so exception text is never interpretable
  # as HTML. The idiom spans the zone, resource, policy, grant, application,
  # operator, and step-up route files and every new TxAbort route re-triggers
  # the finding, so the query is excluded rather than dismissed per alert.
  - exclude:
      id: js/xss-through-exception