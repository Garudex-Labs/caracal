{% extends "layout.html" %}
{% block title %}{{ company }} - Demo{% endblock %}
{% block content %}
<link rel="stylesheet" href="/static/demo.css?v=4">

<div class="demo-shell">
  <div class="demo-body">

    <aside class="chat-panel">
      <header class="panel-header">
        <span class="panel-title">Chat</span>
        <span class="panel-meta">
          <label class="model-picker">
            <span class="model-picker-label">Model</span>
            <select id="model-select" class="model-picker-select"></select>
          </label>
          <span id="agent-count" class="agent-count">idle</span>
        </span>
      </header>

      <div id="memory-bar" class="memory-bar">
        <div class="mem-row">
          <span class="mem-label">Context</span>
          <div class="mem-track"><div id="mem-fill" class="mem-fill"></div></div>
          <span id="mem-tokens" class="mem-tokens">0 / 128k</span>
        </div>
        <div class="mem-row mem-row-compact">
          <span id="mem-agents" class="mem-chip">0 agents</span>
          <span id="mem-compactions" class="mem-chip">0 compactions</span>
          <button type="button" id="mem-toggle" class="mem-toggle" aria-expanded="false">Summaries</button>
        </div>
        <div id="mem-detail" class="mem-detail" hidden></div>
      </div>

      <div class="chat-stream" id="chat-stream">
        <div class="chat-empty" id="chat-empty">Send a prompt to begin.</div>
      </div>

      <div class="chat-input-row">
        <textarea id="prompt-input" rows="2" placeholder="Describe the payout run...">Run the weekly payout cycle across all five regions.</textarea>
        <button class="btn btn-primary" id="start-btn">Send</button>
      </div>
    </aside>

    <section class="graph-panel">
      <header class="panel-header">
        <span class="panel-title">Orchestration graph</span>
        <span id="graph-status" class="panel-meta">idle</span>
      </header>
      <div class="graph-canvas">
        <div class="graph-empty" id="graph-empty">The graph will build as the Finance Control agent dispatches work.</div>
        <svg id="graph-svg" style="display:none"></svg>
      </div>
    </section>

  </div>
</div>

<script src="/static/chat.js?v=4" type="module"></script>
<script src="/static/graph.js?v=4" type="module"></script>
{% endblock %}
