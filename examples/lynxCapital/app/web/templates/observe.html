{% extends "layout.html" %}
{% block title %}{{ company }} - Observe{% endblock %}
{% block content %}
<style>
  .observe-shell { display: flex; flex-direction: column; height: calc(100vh - 44px); }
  .observe-toolbar { background: #fff; border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
  .observe-toolbar input { border: 1px solid var(--border); border-radius: 3px; padding: 5px 10px; font-size: 12px; width: 300px; }
  .observe-toolbar input:focus { outline: none; border-color: var(--accent); }
  .btn { border: none; border-radius: 3px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .observe-body { flex: 1; overflow-y: auto; padding: 16px; }
  .observe-empty { color: var(--text); opacity: 0.35; font-size: 12px; text-align: center; margin-top: 60px; }
  .run-summary { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 24px; align-items: center; }
  .run-summary .run-id { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text); opacity: 0.5; }
  .run-summary .run-stat { font-size: 12px; }
  .run-summary .run-stat strong { color: var(--accent); }
  .tree { display: flex; flex-direction: column; gap: 2px; }
  .span-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 3px; font-size: 12px; cursor: pointer; }
  .span-row:hover { background: var(--surface); }
  .span-row .indent { flex-shrink: 0; }
  .span-row .role  { font-weight: 600; width: 180px; flex-shrink: 0; }
  .span-row .region { width: 60px; flex-shrink: 0; font-size: 11px; opacity: 0.6; }
  .span-row .layer  { width: 140px; flex-shrink: 0; font-size: 11px; opacity: 0.6; }
  .span-row .dur   { width: 70px; text-align: right; font-size: 11px; opacity: 0.5; }
  .span-row .tools { font-size: 11px; opacity: 0.55; }
  .status-pill { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 2px; font-weight: 600; flex-shrink: 0; }
  .status-pill.spawned   { background: #e8eef8; color: var(--accent); }
  .status-pill.running   { background: #dceeff; color: var(--accent); }
  .status-pill.completed { background: #d4f0e2; color: var(--success); }
  .status-pill.denied    { background: #fde8e6; color: var(--danger); }
  .status-pill.failed    { background: #fde8e6; color: var(--danger); }
  .status-pill.cancelled { background: var(--surface); color: var(--text); opacity: 0.6; }
  .tool-detail { padding: 6px 8px 8px 40px; font-size: 11px; border-left: 2px solid #d7dbe0; margin-left: 14px; background: #fafbfc; }
  .tool-row { display: flex; gap: 8px; align-items: flex-start; padding: 3px 0; }
  .tool-row .tool-name { font-family: ui-monospace, monospace; color: var(--teal); font-weight: 600; min-width: 180px; }
  .tool-row .tool-args { font-family: ui-monospace, monospace; color: var(--text); opacity: 0.7; flex: 1; word-break: break-all; }
  .tool-row .tool-dur { font-size: 10px; opacity: 0.5; min-width: 60px; text-align: right; font-family: ui-monospace, monospace; }
  .svc-chip { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 2px; background: #eef4fa; color: var(--accent); margin-left: 6px; font-family: ui-monospace, monospace; }
  .svc-row { margin: 3px 0 3px 20px; font-size: 10.5px; font-family: ui-monospace, monospace; color: var(--text); opacity: 0.72; }
  .svc-row .svc-id { color: var(--accent); }
</style>

<div class="observe-shell">
  <div class="observe-toolbar">
    <input type="text" id="run-id-input" placeholder="Enter run ID...">
    <button class="btn btn-primary" id="load-btn">Load</button>
    <span id="load-status" style="font-size:11px;opacity:0.55;margin-left:8px;"></span>
  </div>
  <div class="observe-body" id="observe-body">
    <div class="observe-empty" id="observe-empty">Enter a run ID above to inspect its lineage.</div>
  </div>
</div>

<script type="module">
const loadBtn = document.getElementById('load-btn');
const runInput = document.getElementById('run-id-input');
const body = document.getElementById('observe-body');
const statusEl = document.getElementById('load-status');
const emptyEl = document.getElementById('observe-empty');

function fmtDur(a, b) {
  if (a == null || b == null) return '--';
  // Server timestamps are float seconds epoch; convert to ms.
  const ms = Math.max(0, Math.round((b - a) * 1000));
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(2) + 's';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtArgs(args) {
  if (!args || typeof args !== 'object') return '';
  const parts = [];
  for (const [k, v] of Object.entries(args)) {
    const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
    parts.push(`${k}=${val.length > 60 ? val.slice(0, 60) + '...' : val}`);
  }
  return parts.join('  ');
}

function pill(status) {
  return `<span class="status-pill ${status}">${status}</span>`;
}

function renderSpan(span, depth) {
  const indent = '&nbsp;'.repeat(depth * 4);
  const toolCount = span.tool_calls ? span.tool_calls.length : 0;
  const dur = fmtDur(span.ts_start, span.ts_end);

  let toolsHtml = '';
  if (toolCount > 0) {
    const rows = span.tool_calls.map(tc => {
      const d = fmtDur(tc.ts_call, tc.ts_result);
      const svcChip = (tc.services && tc.services.length) ? `<span class="svc-chip">\u2192 ${tc.services.length} svc</span>` : '';
      const svcRows = (tc.services || []).map(s => {
        const sd = fmtDur(s.ts_call, s.ts_result);
        return `<div class="svc-row"><span class="svc-id">${escapeHtml(s.id || '')}</span> \u00b7 ${escapeHtml(s.action || '')} \u00b7 ${sd}</div>`;
      }).join('');
      return `<div class="tool-row">
        <span class="tool-name">${escapeHtml(tc.tool || '')}${svcChip}</span>
        <span class="tool-args">${escapeHtml(fmtArgs(tc.args))}</span>
        <span class="tool-dur">${d}</span>
      </div>${svcRows}`;
    }).join('');
    toolsHtml = `<div class="tool-detail" data-for="${span.id}" hidden>${rows}</div>`;
  }

  return `<div class="span-row" data-id="${span.id}">
    <span class="indent">${indent}</span>
    ${pill(span.status)}
    <span class="role">${escapeHtml(span.role || '')}</span>
    <span class="region">${escapeHtml(span.region || '')}</span>
    <span class="layer">${escapeHtml(span.layer || '')}</span>
    <span class="dur">${dur}</span>
    <span class="tools">${toolCount > 0 ? toolCount + ' tool call' + (toolCount > 1 ? 's' : '') : ''}</span>
  </div>${toolsHtml}`;
}

async function load() {
  const runId = runInput.value.trim();
  if (!runId) return;
  loadBtn.disabled = true;
  statusEl.textContent = 'Loading...';
  try {
    const resp = await fetch(`/api/observe/${runId}`);
    if (!resp.ok) { statusEl.textContent = resp.status === 404 ? 'Run not found.' : 'Error.'; return; }
    const data = await resp.json();

    const spans = data.spans;
    const byParent = {};
    const roots = [];
    for (const s of spans) {
      if (!s.parent) { roots.push(s); }
      else { (byParent[s.parent] = byParent[s.parent] || []).push(s); }
    }

    const statusCounts = {};
    for (const s of spans) statusCounts[s.status] = (statusCounts[s.status] || 0) + 1;
    const summary = Object.entries(statusCounts).map(([k,v]) => `<strong>${v}</strong> ${k}`).join(', ');

    let html = `<div class="run-summary">
      <div><div class="run-id">${data.runId}</div></div>
      <div class="run-stat">Status: ${pill(data.status)}</div>
      <div class="run-stat">Agents: <strong>${spans.length}</strong></div>
      <div class="run-stat">${summary}</div>
      <div class="run-stat">Duration: ${fmtDur(data.ts_start, data.ts_end)}</div>
    </div><div class="tree">`;

    function walk(nodes, depth) {
      for (const s of nodes) {
        html += renderSpan(s, depth);
        if (byParent[s.id]) walk(byParent[s.id], depth + 1);
      }
    }
    walk(roots, 0);
    html += '</div>';

    emptyEl.style.display = 'none';
    body.innerHTML = html;
    statusEl.textContent = `${spans.length} spans`;
    body.querySelectorAll('.span-row').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        const detail = body.querySelector(`.tool-detail[data-for="${id}"]`);
        if (detail) detail.hidden = !detail.hidden;
      });
    });
  } catch(e) {
    statusEl.textContent = 'Failed to load.';
  } finally {
    loadBtn.disabled = false;
  }
}

loadBtn.addEventListener('click', load);
runInput.addEventListener('keydown', e => { if (e.key === 'Enter') load(); });

const params = new URLSearchParams(location.search);
if (params.get('run')) { runInput.value = params.get('run'); load(); }
</script>
{% endblock %}
