#
# Lynx Capital application container. The Caracal platform is started separately
# with `caracal up` (released v2026.06.25-rc.1), which provisions the shared
# `caracalData` Docker network this app joins to reach the Gateway and Control
# API. The provider lab runs via `_mock/docker-compose.yml` on the same network.

services:

  lynx:
    build:
      context: .
      dockerfile: Dockerfile
    image: lynx-app:latest
    container_name: lynx
    env_file: .env
    environment:
      LYNX_HOOK_BASE: "http://lynx:8000"
    ports:
      - "8000:8000"
    networks:
      - caracalData

networks:
  # Created by `caracal up`; the Caracal control plane (api, sts, gateway,
  # coordinator, audit, and the web console) and the provider lab share it.
  caracalData:
    external: true
    name: caracalData
