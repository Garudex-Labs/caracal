#
# Provider lab network: each mock external provider runs as its own service
# on its own published localhost port so the boundary feels like real third parties.

services:

  aurum-pay:
    build:
      context: ..
      dockerfile: _mock/Dockerfile
    image: lynx-mock:latest
    command: python -m _mock.providerlab.server
    environment:
      PROVIDERLAB_PROVIDER: "aurum-pay"
      PROVIDERLAB_HOST: "0.0.0.0"
      PROVIDERLAB_PORT: "9400"
      PROVIDERLAB_FAST: "${PROVIDERLAB_FAST:-0}"
    ports:
      - "127.0.0.1:9400:9400"
    networks: [providerlab]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9400/healthz').read()"]
      interval: 5s
      timeout: 2s
      retries: 5

