# Time-boxed Trivy suppressions for upstream-pending base image CVEs that Caracal cannot remediate by pinning.

# The gcr.io/distroless/nodejs24-debian12:nonroot runtime base ships libssl3
# 3.0.18-1~deb12u2. Debian has published the fix, but the distroless image has
# not been rebuilt yet, and the :nonroot tag still resolves to our pinned digest,
# so there is no newer digest to bump to. These entries expire so the findings
# resurface for re-evaluation once the base image is rebuilt.
vulnerabilities:
  - id: CVE-2026-31789
    statement: "libssl3 fix pending upstream distroless/nodejs24 rebuild; no newer base digest available."
    expired_at: 2026-07-21
  - id: CVE-2026-28387
    statement: "libssl3 fix pending upstream distroless/nodejs24 rebuild; no newer base digest available."
    expired_at: 2026-07-21
  - id: CVE-2026-28388
    statement: "libssl3 fix pending upstream distroless/nodejs24 rebuild; no newer base digest available."
    expired_at: 2026-07-21
  - id: CVE-2026-28389
    statement: "libssl3 fix pending upstream distroless/nodejs24 rebuild; no newer base digest available."
    expired_at: 2026-07-21
  - id: CVE-2026-28390
    statement: "libssl3 fix pending upstream distroless/nodejs24 rebuild; no newer base digest available."
    expired_at: 2026-07-21
  - id: CVE-2026-45447
    statement: "libssl3 fix pending upstream distroless/nodejs24 rebuild; no newer base digest available."
    expired_at: 2026-07-21

# The postgres:18-alpine base image ships gosu built against golang.org/x/sys
# v0.1.0. CVE-2026-39824 is in the x/sys windows package (NewNTUnicodeString),
# which is not compiled into the linux/amd64 gosu binary, so the finding is not
# reachable on this platform. Remediation requires an upstream gosu rebuild.
  - id: CVE-2026-39824
    statement: "Windows-only x/sys code path in upstream gosu inside postgres:18-alpine; unreachable in linux/amd64 builds."
    expired_at: 2026-07-30

# The same postgres:18-alpine gosu binary is flagged for CVE-2026-39822, the Go
# standard library os.Root symlink-traversal bug. gosu drops privileges and
# execs; it never opens files through os.Root, so the vulnerable API is not
# reachable in the binary. gosu is third-party and cannot be remediated by
# pinning; it needs an upstream rebuild on Go 1.26.5+. Caracal's own Go images
# already build on the patched 1.26.5 toolchain.
  - id: CVE-2026-39822
    statement: "os.Root API unused by upstream gosu inside postgres:18-alpine; unreachable, and the third-party binary cannot be remediated by pinning."
    expired_at: 2026-08-11

# The same gosu binary is flagged for CVE-2026-42505, a crypto/tls Encrypted
# Client Hello information disclosure. gosu performs no network or TLS I/O - it
# resolves a user, drops privileges, and execs the target process - so the
# crypto/tls handshake path is never invoked. Third-party binary; needs an
# upstream rebuild on Go 1.26.5+, which Caracal's own Go images already use.
  - id: CVE-2026-42505
    statement: "gosu inside postgres:18-alpine performs no TLS I/O; the crypto/tls Encrypted Client Hello path is unreachable, and the third-party binary cannot be remediated by pinning."
    expired_at: 2026-08-11

# The postgres:18-alpine base image carries c-ares as a transitive dependency.
# CVE-2026-33630 is a use-after-free reachable only through ares_getaddrinfo()
# over TCP against an attacker-controlled DNS responder. Caracal's postgres
# container resolves through the trusted cluster resolver and is not exposed to
# hostile DNS responses. The image already runs `apk upgrade`, so the next
# rebuild adopts c-ares 1.34.8-r0 automatically once Alpine publishes it.
  - id: CVE-2026-33630
    statement: "postgres c-ares not exposed to untrusted DNS responders in Caracal; apk upgrade adopts 1.34.8-r0 on rebuild once Alpine publishes it."
    expired_at: 2026-08-11
