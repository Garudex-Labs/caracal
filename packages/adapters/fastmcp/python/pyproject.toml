# Python package metadata for the FastMCP connector.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-fastmcp"
version = "0.2.0rc4"
description = "FastMCP adapter for Caracal mandate verification"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "caracalai-verify==0.2.0rc4",
  "caracalai-revocation==0.2.0rc4",
]

[project.optional-dependencies]
fastmcp = ["fastmcp>=3.4.2"]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_fastmcp"]
