# Python package metadata for the ASGI connector.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-asgi"
version = "0.2.0rc5"
description = "ASGI middleware for Caracal mandate verification (FastAPI, Starlette, Quart)"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "caracalai-verify==0.2.0rc5",
  "caracalai-revocation==0.2.0rc5",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_asgi"]
