[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "caracal-core"
version = "0.7.0"
description = "Host orchestrator for the Caracal pre-execution authority enforcement runtime"
requires-python = ">=3.10"
authors = [{ name = "Caracal Contributors" }]
keywords = ["ai", "agents", "authority", "enforcement", "mandate", "ledger", "delegation", "policy", "security"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "python-dotenv>=1.0.0",
]

[project.scripts]
caracal = "caracal.runtime.entrypoints:caracal_entrypoint"

[project.urls]
Homepage = "https://github.com/Garudex-Labs/caracal"
Documentation = "https://github.com/Garudex-Labs/caracal/blob/main/README.md"
Repository = "https://github.com/Garudex-Labs/caracal"
Issues = "https://github.com/Garudex-Labs/caracal/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["caracal*"]
namespaces = true

[tool.setuptools.package-data]
"caracal.runtime.data" = ["*.yml", "*.yaml"]
