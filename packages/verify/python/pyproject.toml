# Python package metadata for MCP transport authentication.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-verify"
version = "0.2.0rc5"
description = "Framework-neutral mandate verification for Caracal-issued JWTs"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "caracalai-identity==0.2.0rc5",
  "caracalai-revocation==0.2.0rc5",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai_verify"]
