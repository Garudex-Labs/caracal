[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "caracal-server"
version = "0.7.0"
description = "Caracal runtime server modules. Installed inside the caracal-runtime container image only."
requires-python = ">=3.10"
authors = [{ name = "Caracal Contributors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Private :: Do Not Upload",
]
dependencies = [
    "caracal-core",
    "caracal-sdk>=0.1.0",
    "click>=8.1.0",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0.0",
    "alembic>=1.12.0",
    "psycopg2-binary>=2.9.0",
    "fastapi>=0.104.0",
    "httpx>=0.25.0",
    "uvicorn[standard]>=0.24.0",
    "pyjwt>=2.8.0",
    "cryptography>=46.0.7",
    "bcrypt>=4.1.0",
    "cachetools>=5.3.0",
    "prometheus-client>=0.19.0",
    "structlog>=24.1.0",
    "redis>=5.0.0",
    "rich>=13.0.0",
    "prompt_toolkit>=3.0.0",
    "pyperclip>=1.11.0",
    "age>=0.5.1",
    "textual>=0.47.0",
    "toml>=0.10.2",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["caracal*"]
namespaces = true

[tool.setuptools.package-data]
"caracal.db" = ["*.ini"]
