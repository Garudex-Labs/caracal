# Python package metadata for the Caracal SDK.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caracalai-sdk"
version = "0.1.6rc3"
description = "Caracal SDK for Python: short-lived, policy-approved authority for AI agents - agent sessions, delegation, and transport hooks"
license = "Apache-2.0"
license-files = ["LICENSE"]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "caracalai-oauth==0.1.6rc3",
  "httpx>=0.28.0",
  "idna>=3.15",
]

[tool.hatch.build.targets.wheel]
packages = ["caracalai"]
