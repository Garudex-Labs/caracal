# Runtime orchestration for self-hosted installs using versioned GHCR images.

name: caracal

x-logging: &defaultLogging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security: &defaultSecurity
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-appService: &appService
  restart: unless-stopped
  init: true
  stop_grace_period: 20s
  logging: *defaultLogging
  <<: *defaultSecurity
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  networks:
    - caracalData

x-appResources: &appResources
  deploy:
    resources:
      limits:
        cpus: "${CARACAL_APP_CPU_LIMIT:-1.0}"
        memory: "${CARACAL_APP_MEM_LIMIT:-512M}"
        pids: 256
      reservations:
        cpus: "${CARACAL_APP_CPU_RESERVE:-0.1}"
        memory: "${CARACAL_APP_MEM_RESERVE:-128M}"

networks:
  caracalData:
    driver: bridge
    name: caracalData

secrets:
  postgresPassword:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/postgresPassword
  redisPassword:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/redisPassword
  caracalAdminToken:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/caracalAdminToken
  caracalCoordinatorToken:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/caracalCoordinatorToken
  metricsBearer:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/metricsBearer
  zoneKek:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/zoneKek
  auditHmacKey:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/auditHmacKey
  streamsHmacKey:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/streamsHmacKey
  gatewayStsHmacKey:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/gatewayStsHmacKey
  databaseUrl:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/databaseUrl
  authDatabaseUrl:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/authDatabaseUrl
  caracalAuthSecret:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/caracalAuthSecret
  redisUrl:
    file: ${CARACAL_SECRETS_DIR:-./secrets}/redisUrl

services:
  replayVolumeInit:
    image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
    restart: "no"
    network_mode: none
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    read_only: true
    command:
      - sh
      - -c
      - |
        set -eu
        for dir in /state/sts /state/gateway; do
          mkdir -p "$$dir/audit-replay"
          chmod 0750 "$$dir" "$$dir/audit-replay"
          chown -R 65532:65532 "$$dir"
        done
    volumes:
      - stsReplay:/state/sts
      - gatewayReplay:/state/gateway

  postgres:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-postgres:v${CARACAL_VERSION}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *defaultLogging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    networks:
      - caracalData
    secrets:
      - source: postgresPassword
        target: postgresPassword
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caracal}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgresPassword
      POSTGRES_DB: ${POSTGRES_DB:-caracal}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgresData:/var/lib/postgresql
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=0755
    shm_size: "256m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h /var/run/postgresql"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  redis:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-redis:v${CARACAL_VERSION}
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    logging: *defaultLogging
    <<: *defaultSecurity
    networks:
      - caracalData
    secrets:
      - source: redisPassword
        target: redisPassword
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redisPassword
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisData:/data
      - type: tmpfs
        target: /run/caracal
        tmpfs:
          mode: 1023
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redisPassword) redis-cli --no-auth-warning PING | grep -q PONG && test -f /run/caracal/provisioned"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  dbMigrate:
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-postgres:v${CARACAL_VERSION}
    restart: "no"
    init: true
    logging: *defaultLogging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - caracalData
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - source: postgresPassword
        target: postgresPassword
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-caracal}
      PGPASSWORD_FILE: /run/secrets/postgresPassword
      PGDATABASE: ${POSTGRES_DB:-caracal}
      # Internal isolated network with the bundled Postgres (no server TLS).
      # External/managed databases must set CARACAL_DB_SSLMODE to require or verify-full.
      PGSSLMODE: ${CARACAL_DB_SSLMODE:-disable}
    entrypoint: ["/bin/sh", "/usr/local/bin/caracal-migrate"]

  sts:
    <<: [*appService, *appResources]
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-go:v${CARACAL_VERSION}
    command: ["/usr/local/bin/sts"]
    depends_on:
      replayVolumeInit:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: zoneKek
        target: zoneKek
      - source: auditHmacKey
        target: auditHmacKey
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: gatewayStsHmacKey
        target: gatewayStsHmacKey
      - source: metricsBearer
        target: metricsBearer
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-stable}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      ZONE_KEK_FILE: /run/secrets/zoneKek
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      GATEWAY_STS_HMAC_KEY_FILE: /run/secrets/gatewayStsHmacKey
      ZONE_KEK_PROVIDER: local
      ISSUER_URL: ${CARACAL_STS_ISSUER_URL:-http://localhost:8080}
      STS_ADMIN_TOKEN: ${STS_ADMIN_TOKEN:-}
      METRICS_BEARER_FILE: /run/secrets/metricsBearer
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - stsReplay:/var/lib/caracal
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  api:
    <<: [*appService, *appResources]
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-node:v${CARACAL_VERSION}
    command: ["/app/api/dist/main.js"]
    depends_on:
      sts:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: zoneKek
        target: zoneKek
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: gatewayStsHmacKey
        target: gatewayStsHmacKey
      - source: caracalAdminToken
        target: caracalAdminToken
      - source: metricsBearer
        target: metricsBearer
      - source: auditHmacKey
        target: auditHmacKey
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-stable}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      STS_URL: http://sts:8080
      CARACAL_GATEWAY_URL: http://gateway:8081
      CARACAL_COORDINATOR_URL: http://coordinator:4000
      # Service-to-service traffic stays on the compose-internal bridge network and is
      # authenticated with HMAC keys and tokens, so plain http between containers is safe.
      CARACAL_ALLOW_INSECURE_CONFIG_URLS: "true"
      ZONE_KEK_FILE: /run/secrets/zoneKek
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      GATEWAY_STS_HMAC_KEY_FILE: /run/secrets/gatewayStsHmacKey
      CARACAL_ADMIN_TOKEN_FILE: /run/secrets/caracalAdminToken
      METRICS_BEARER_FILE: /run/secrets/metricsBearer
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      CARACAL_CONTROL_ENABLED: "true"
      CONTROL_GATE_FILE: /run/caracal-control/enabled
      STS_JWKS_URL: http://sts:8080/.well-known/jwks.json
      STS_ISSUER_URL: ${CARACAL_STS_ISSUER_URL:-http://localhost:8080}
      CONTROL_AUDIENCE: ${CONTROL_AUDIENCE:-caracal-control}
      CONTROL_API_TOKEN_FILE: /run/secrets/caracalAdminToken
      # Caracal Operator. AI providers are added in the console's AI settings: the key is
      # sealed into the caracal.sys system zone and the governed resource points at the
      # OpenAI-compatible endpoint the operator enters, so no model traffic leaves ungoverned
      # and no key ever lives in an env file. The Operator always self-governs: the control
      # plane provisions that zone and its rotating least-privilege identities autonomously.
      API_OPERATOR_ENABLED: ${API_OPERATOR_ENABLED:-true}
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - "${CARACAL_CONTROL_STATE_DIR:-./control}:/run/caracal-control:ro"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  gateway:
    <<: *appService
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-go:v${CARACAL_VERSION}
    command: ["/usr/local/bin/gateway"]
    deploy:
      resources:
        limits:
          cpus: "${CARACAL_GATEWAY_CPU_LIMIT:-2.0}"
          memory: "${CARACAL_GATEWAY_MEM_LIMIT:-1G}"
          pids: 256
        reservations:
          cpus: "${CARACAL_APP_CPU_RESERVE:-0.1}"
          memory: "${CARACAL_APP_MEM_RESERVE:-128M}"
    depends_on:
      replayVolumeInit:
        condition: service_completed_successfully
      sts:
        condition: service_healthy
      api:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: auditHmacKey
        target: auditHmacKey
      - source: gatewayStsHmacKey
        target: gatewayStsHmacKey
      - source: caracalAdminToken
        target: caracalAdminToken
      - source: metricsBearer
        target: metricsBearer
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-stable}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      STS_URL: http://sts:8080
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      GATEWAY_STS_HMAC_KEY_FILE: /run/secrets/gatewayStsHmacKey
      CARACAL_ADMIN_TOKEN_FILE: /run/secrets/caracalAdminToken
      METRICS_BEARER_FILE: /run/secrets/metricsBearer
      UPSTREAM_HOST_ALLOWLIST: ${UPSTREAM_HOST_ALLOWLIST:-}
      PORT: 8081
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - gatewayReplay:/var/lib/caracal
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  audit:
    <<: [*appService, *appResources]
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-go:v${CARACAL_VERSION}
    command: ["/usr/local/bin/audit"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: auditHmacKey
        target: auditHmacKey
      - source: metricsBearer
        target: metricsBearer
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-stable}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      AUDIT_HMAC_KEY_FILE: /run/secrets/auditHmacKey
      AUDIT_ADMIN_TOKEN: ${AUDIT_ADMIN_TOKEN:-}
      METRICS_BEARER_FILE: /run/secrets/metricsBearer
      AUDIT_EXPORT_S3_ENDPOINT: ${AUDIT_EXPORT_S3_ENDPOINT:-}
      AUDIT_EXPORT_S3_BUCKET: ${AUDIT_EXPORT_S3_BUCKET:-}
      AUDIT_EXPORT_S3_REGION: ${AUDIT_EXPORT_S3_REGION:-us-east-1}
      PORT: "9090"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  coordinator:
    <<: [*appService, *appResources]
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-node:v${CARACAL_VERSION}
    command: ["/app/coordinator/dist/main.js"]
    depends_on:
      sts:
        condition: service_healthy
      dbMigrate:
        condition: service_completed_successfully
    secrets:
      - source: databaseUrl
        target: databaseUrl
      - source: redisUrl
        target: redisUrl
      - source: streamsHmacKey
        target: streamsHmacKey
      - source: caracalCoordinatorToken
        target: caracalCoordinatorToken
      - source: metricsBearer
        target: metricsBearer
    environment:
      CARACAL_MODE: ${CARACAL_MODE:-stable}
      DATABASE_URL_FILE: /run/secrets/databaseUrl
      REDIS_URL_FILE: /run/secrets/redisUrl
      STS_URL: http://sts:8080
      ISSUER_URL: ${CARACAL_STS_ISSUER_URL:-http://localhost:8080}
      # Service-to-service traffic stays on the compose-internal bridge network and is
      # authenticated with HMAC keys and tokens, so plain http between containers is safe.
      CARACAL_ALLOW_INSECURE_CONFIG_URLS: "true"
      STREAMS_HMAC_KEY_FILE: /run/secrets/streamsHmacKey
      CARACAL_COORDINATOR_TOKEN_FILE: /run/secrets/caracalCoordinatorToken
      AGENT_COORDINATOR_SCOPE: agent:lifecycle
      METRICS_BEARER_FILE: /run/secrets/metricsBearer
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  web:
    <<: [*appService, *appResources]
    image: ${CARACAL_REGISTRY:-ghcr.io/garudex-labs/}caracal-web:v${CARACAL_VERSION}
    command: ["/app/auth/dist/server.js"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      coordinator:
        condition: service_healthy
    secrets:
      - source: authDatabaseUrl
        target: authDatabaseUrl
      - source: caracalAuthSecret
        target: caracalAuthSecret
      - source: caracalAdminToken
        target: caracalAdminToken
      - source: caracalCoordinatorToken
        target: caracalCoordinatorToken
    environment:
      NODE_ENV: production
      CARACAL_AUTH_DATABASE_URL_FILE: /run/secrets/authDatabaseUrl
      CARACAL_AUTH_DATABASE_SSL: disable
      CARACAL_AUTH_SECRET_FILE: /run/secrets/caracalAuthSecret
      CARACAL_AUTH_AUTO_MIGRATE: "true"
      CARACAL_AUTH_URL: ${CARACAL_WEB_URL:-http://localhost:3001}
      CARACAL_WEB_ORIGIN: ${CARACAL_WEB_ORIGIN:-}
      CARACAL_OPERATOR_EMAILS: ${CARACAL_OPERATOR_EMAILS:-}
      CARACAL_OPEN_REGISTRATION: ${CARACAL_OPEN_REGISTRATION:-}
      CARACAL_PASSWORD_SIGNUP: ${CARACAL_PASSWORD_SIGNUP:-}
      CARACAL_SMTP_URL: ${CARACAL_SMTP_URL:-}
      CARACAL_SMTP_FROM: ${CARACAL_SMTP_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      CARACAL_API_URL: http://api:3000
      CARACAL_COORDINATOR_URL: http://coordinator:4000
      CARACAL_ADMIN_TOKEN_FILE: /run/secrets/caracalAdminToken
      CARACAL_COORDINATOR_TOKEN_FILE: /run/secrets/caracalCoordinatorToken
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3002
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3001:3002"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  postgresData:
  redisData:
  stsReplay:
  gatewayReplay:
