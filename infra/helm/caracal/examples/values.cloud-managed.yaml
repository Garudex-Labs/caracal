# Reference production overlay for managed Kubernetes with externalized state.
# The deployment shape is cloud-agnostic; the only per-cloud substitutions are
# the managed Postgres/Redis endpoints, the storage class, the ingress class,
# and the ingress annotations. See the per-cloud table in
# docs operations/cloud-reference-deployments. Pair this overlay with the
# External Secrets manifests in ./external-secrets so caracal-runtime is
# provisioned from a secret manager (secrets.create stays false).

global:
  mode: stable
  evaluation: false
  imagePullPolicy: IfNotPresent
  logLevel: info
  otelExporterOtlpEndpoint: "http://otel-collector.observability.svc.cluster.local:4317"

# Secret is provisioned externally by the External Secrets Operator.
secrets:
  create: false
  runtimeSecretName: caracal-runtime
  database:
    host: caracal-postgres.managed.example.com
    port: 5432
    name: caracal
    sslMode: require
  redis:
    host: caracal-redis.managed.example.com
    port: 6379
    database: 0

# Default-deny with explicit egress to managed dependencies and provider APIs.
# Replace the CIDRs with the real managed Postgres/Redis ranges and the egress
# your providers and object stores require. Open DNS/HTTPS stay disabled.
networkPolicy:
  enabled: true
  allowOpenDns: false
  allowOpenHttps: false
  dnsEgress:
    - ipBlock:
        cidr: 10.0.0.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  # Replace these selectors with the namespace and pod labels used by your ingress
  # controller. Every chart-managed Ingress stays unreachable until this rule matches.
  extraIngress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
  extraEgress:
    - to:
        - ipBlock:
            cidr: 10.20.0.0/16
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379

replayPersistence:
  enabled: true
  storageClassName: "" # set to a durable managed class, e.g. gp3 / premium-rwo / managed-csi
  accessModes:
    - ReadWriteOnce
  size: 5Gi

serviceMonitor:
  enabled: true
  interval: 30s

alertRules:
  enabled: true

ingress:
  sts:
    enabled: true
    className: "" # e.g. alb / gce / azure-application-gateway / nginx
    host: sts.caracal.example.com
    tlsSecretName: caracal-sts-tls
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  gateway:
    enabled: true
    className: "" # e.g. alb / gce / azure-application-gateway / nginx
    host: gateway.caracal.example.com
    tlsSecretName: caracal-gateway-tls
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  api:
    enabled: true
    className: ""
    host: api.caracal.example.com
    tlsSecretName: caracal-api-tls
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
