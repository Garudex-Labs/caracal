# Caracal, a product of Garudex Labs
#
# Materializes the Caracal runtime Secret (caracal-runtime) from a secret
# manager through the External Secrets Operator. This manifest is cloud-agnostic:
# point storeRef at any of the provider ClusterSecretStores in this directory.
# Set secrets.create=false in Helm values so the chart consumes this Secret
# instead of rendering plaintext.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: caracal-runtime
  namespace: caracal
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: caracal-aws
    kind: ClusterSecretStore
  target:
    name: caracal-runtime
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Composite connection strings the chart mounts as files.
        databaseUrl: "postgres://{{ .pgUser }}:{{ .pgPassword }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgDatabase }}?sslmode=require"
        redisUrl: "rediss://:{{ .redisPassword }}@{{ .redisHost }}:{{ .redisPort }}/{{ .redisDatabase }}"
        # Each service connects as its own least-privilege role. The per-service
        # passwords are derived from the administrative password, matching the
        # chart's evaluation secret; the migration job provisions the logins
        # from the *DbPassword keys on every run.
        apiDbPassword: "{{ printf \"%s:caracalapi\" .pgPassword | sha256sum }}"
        stsDbPassword: "{{ printf \"%s:caracalsts\" .pgPassword | sha256sum }}"
        gatewayDbPassword: "{{ printf \"%s:caracalgateway\" .pgPassword | sha256sum }}"
        auditDbPassword: "{{ printf \"%s:caracalaudit\" .pgPassword | sha256sum }}"
        coordinatorDbPassword: "{{ printf \"%s:caracalcoordinator\" .pgPassword | sha256sum }}"
        authDbPassword: "{{ printf \"%s:caracalauth\" .pgPassword | sha256sum }}"
        apiDatabaseUrl: "postgres://caracalapi:{{ printf \"%s:caracalapi\" .pgPassword | sha256sum }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgDatabase }}?sslmode=require"
        stsDatabaseUrl: "postgres://caracalsts:{{ printf \"%s:caracalsts\" .pgPassword | sha256sum }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgDatabase }}?sslmode=require"
        gatewayDatabaseUrl: "postgres://caracalgateway:{{ printf \"%s:caracalgateway\" .pgPassword | sha256sum }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgDatabase }}?sslmode=require"
        auditDatabaseUrl: "postgres://caracalaudit:{{ printf \"%s:caracalaudit\" .pgPassword | sha256sum }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgDatabase }}?sslmode=require"
        coordinatorDatabaseUrl: "postgres://caracalcoordinator:{{ printf \"%s:caracalcoordinator\" .pgPassword | sha256sum }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgDatabase }}?sslmode=require"
        authDatabaseUrl: "postgres://caracalauth:{{ printf \"%s:caracalauth\" .pgPassword | sha256sum }}@{{ .pgHost }}:{{ .pgPort }}/{{ .pgAuthDatabase }}?sslmode=require"
        caracalAuthSecret: "{{ .caracalAuthSecret }}"
        secretStoreKek: "{{ .secretStoreKek }}"
        auditHmacKey: "{{ .auditHmacKey }}"
        streamsHmacKey: "{{ .streamsHmacKey }}"
        idempotencyHmacKey: "{{ .idempotencyHmacKey }}"
        gatewayStsHmacKey: "{{ .gatewayStsHmacKey }}"
        caracalAdminToken: "{{ .caracalAdminToken }}"
        caracalCoordinatorToken: "{{ .caracalCoordinatorToken }}"
        stsAdminToken: "{{ .stsAdminToken }}"
        auditAdminToken: "{{ .auditAdminToken }}"
        metricsBearer: "{{ .metricsBearer }}"
  data:
    - secretKey: pgUser
      remoteRef:
        key: caracal/postgres
        property: username
    - secretKey: pgPassword
      remoteRef:
        key: caracal/postgres
        property: password
    - secretKey: pgHost
      remoteRef:
        key: caracal/postgres
        property: host
    - secretKey: pgPort
      remoteRef:
        key: caracal/postgres
        property: port
    - secretKey: pgDatabase
      remoteRef:
        key: caracal/postgres
        property: database
    - secretKey: pgAuthDatabase
      remoteRef:
        key: caracal/postgres
        property: authDatabase
    - secretKey: caracalAuthSecret
      remoteRef:
        key: caracal/auth-secret
    - secretKey: redisPassword
      remoteRef:
        key: caracal/redis
        property: password
    - secretKey: redisHost
      remoteRef:
        key: caracal/redis
        property: host
    - secretKey: redisPort
      remoteRef:
        key: caracal/redis
        property: port
    - secretKey: redisDatabase
      remoteRef:
        key: caracal/redis
        property: database
    - secretKey: secretStoreKek
      remoteRef:
        key: caracal/secret-store-kek
    - secretKey: auditHmacKey
      remoteRef:
        key: caracal/audit-hmac-key
    - secretKey: streamsHmacKey
      remoteRef:
        key: caracal/streams-hmac-key
    - secretKey: idempotencyHmacKey
      remoteRef:
        key: caracal/idempotency-hmac-key
    - secretKey: gatewayStsHmacKey
      remoteRef:
        key: caracal/gateway-sts-hmac-key
    - secretKey: caracalAdminToken
      remoteRef:
        key: caracal/admin-token
    - secretKey: caracalCoordinatorToken
      remoteRef:
        key: caracal/coordinator-token
    - secretKey: stsAdminToken
      remoteRef:
        key: caracal/sts-admin-token
    - secretKey: auditAdminToken
      remoteRef:
        key: caracal/audit-admin-token
    - secretKey: metricsBearer
      remoteRef:
        key: caracal/metrics-bearer
