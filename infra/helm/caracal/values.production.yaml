# Production Helm values for hardened Caracal deployments.

global:
  mode: stable
  evaluation: false
  imagePullPolicy: IfNotPresent

secrets:
  create: false

networkPolicy:
  allowOpenDns: false
  allowOpenHttps: false
  dnsEgress: []
  extraEgress: []
