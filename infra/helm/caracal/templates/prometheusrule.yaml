{{- if .Values.alertRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "caracal.fullname" . }}
  labels:
    {{- include "caracal.labels" . | nindent 4 }}
    {{- with .Values.alertRules.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: caracal.enterprise-readiness
      rules:
        - alert: CaracalSTSOPACompileErrors
          expr: increase(caracal_sts_opa_compile_errors_total[5m]) > 0
          for: 2m
          labels:
            severity: warning
            component: sts
          annotations:
            summary: STS OPA policy compilation is failing
            description: A policy bundle failed compilation. STS fails closed for affected policy loads; inspect STS logs and policy activation history.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalstsopacompileerrors
        - alert: CaracalSTSPolicyBundleStale
          expr: caracal_sts_opa_max_policy_age_seconds > {{ .Values.alertRules.stsMaxPolicyAgeSeconds }}
          for: 5m
          labels:
            severity: warning
            component: sts
          annotations:
            summary: STS policy bundle age exceeds the configured threshold
            description: Policy invalidation or PostgreSQL polling may be delayed. Check Redis policy invalidation stream and STS readiness.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalstspolicybundlestale
        - alert: CaracalSTSProviderRefreshErrors
          expr: increase(caracal_sts_provider_refresh_errors_total[5m]) > {{ .Values.alertRules.stsProviderRefreshErrors }}
          for: 2m
          labels:
            severity: warning
            component: sts
          annotations:
            summary: STS provider refresh coordination is failing
            description: Provider credential refresh coordination is reporting Redis lease/result errors. Agents using provider-backed grants may fail closed until Redis and STS recover.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalstsproviderrefresherrors
        - alert: CaracalSTSProviderCircuitOpen
          expr: increase(caracal_sts_provider_circuit_open_total[5m]) > {{ .Values.alertRules.stsProviderCircuitOpen }}
          for: 2m
          labels:
            severity: warning
            component: sts
          annotations:
            summary: STS provider refresh circuit is opening
            description: A provider refresh circuit is rejecting refresh attempts after repeated provider failures. Provider-backed resources fail closed until the provider or credential issue is corrected.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalstsprovidercircuitopen
        - alert: CaracalAuditDLQNonEmpty
          expr: caracal_audit_dlq_size > {{ .Values.alertRules.auditDlqSize }}
          for: 2m
          labels:
            severity: warning
            component: audit
          annotations:
            summary: Audit dead-letter queue is non-empty
            description: Audit events are failing ingestion or verification. Inspect Audit logs, DLQ age, producer HMAC failures, and Redis stream health.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalauditdlqnonempty
        - alert: CaracalAuditDLQGrowth
          expr: increase(caracal_audit_dlq_size[10m]) > {{ .Values.alertRules.auditDlqGrowth }}
          for: 5m
          labels:
            severity: critical
            component: audit
          annotations:
            summary: Audit dead-letter queue is growing
            description: Audit failure backlog is increasing. Protected action evidence may be delayed; stop risky rollouts and recover Audit/Redis/Postgres before continuing.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalauditdlqgrowth
        - alert: CaracalAuditConsumerLagHigh
          expr: caracal_audit_consumer_lag > {{ .Values.alertRules.auditConsumerLag }}
          for: 5m
          labels:
            severity: warning
            component: audit
          annotations:
            summary: Audit consumer lag is high
            description: Audit ingestion is behind the Redis stream. Scale Audit, check PostgreSQL latency, and confirm Redis memory is not constrained.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalauditconsumerlaghigh
        - alert: CaracalGatewayAuditReplayBacklogOld
          expr: caracal_gateway_audit_replay_oldest_age_seconds > {{ .Values.alertRules.auditReplayOldestAgeSeconds }}
          for: 5m
          labels:
            severity: warning
            component: gateway
          annotations:
            summary: Gateway audit replay backlog is aging
            description: Gateway has audit replay files waiting on disk for longer than the configured threshold. Recover Redis/Audit and confirm replay files drain before continuing risky rollouts.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewayauditreplaybacklogold
        - alert: CaracalSTSAuditReplayBacklogOld
          expr: caracal_sts_audit_replay_oldest_age_seconds > {{ .Values.alertRules.auditReplayOldestAgeSeconds }}
          for: 5m
          labels:
            severity: warning
            component: sts
          annotations:
            summary: STS audit replay backlog is aging
            description: STS has audit replay files waiting on disk for longer than the configured threshold. Recover Redis/Audit and confirm replay files drain before continuing risky rollouts.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalstsauditreplaybacklogold
        - alert: CaracalGatewayAuditEvidenceLost
          expr: caracal_gateway_audit_dropped_total > 0
          for: 0m
          labels:
            severity: critical
            component: gateway
          annotations:
            summary: Gateway audit evidence was irrecoverably lost
            description: Gateway failed both Redis audit delivery and durable replay persistence. Preserve service and storage evidence, stop risky traffic, and replace the affected pod only after recording the incident scope.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewayauditevidencelost
        - alert: CaracalSTSAuditEvidenceLost
          expr: caracal_sts_audit_dropped_total > 0
          for: 0m
          labels:
            severity: critical
            component: sts
          annotations:
            summary: STS audit evidence was irrecoverably lost
            description: STS failed both Redis audit delivery and durable replay persistence. Preserve service and storage evidence, stop token issuance through the affected pod, and replace it only after recording the incident scope.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalstsauditevidencelost
        - alert: CaracalAuditTamperDetected
          expr: increase(caracal_audit_tamper_mismatch_total[5m]) + increase(caracal_audit_tamper_chain_breaks_total[5m]) + increase(caracal_audit_tamper_hmac_failures_total[5m]) > 0
          for: 0m
          labels:
            severity: critical
            component: audit
          annotations:
            summary: Audit tamper evidence detected
            description: Audit chain verification detected mismatch, ordering break, or stored HMAC failure. Treat as a security incident.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalaudittamperdetected
        - alert: CaracalAPIOutboxDeadMessages
          expr: caracal_api_outbox_dead_total > {{ .Values.alertRules.apiOutboxDead }}
          for: 2m
          labels:
            severity: critical
            component: api
          annotations:
            summary: API transactional outbox has abandoned messages
            description: Control-plane events exhausted delivery attempts and may not have reached Redis consumers. Recover Redis or stream consumers, inspect API logs, and reconcile affected rows before continuing rollouts.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalapioutboxdeadmessages
        - alert: CaracalAPIOutboxPendingOldest
          expr: caracal_api_outbox_oldest_pending_age_seconds > {{ .Values.alertRules.apiOutboxPendingAgeSeconds }}
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: API transactional outbox is not draining promptly
            description: Control-plane events are delayed before Redis publication. Check Redis health, API outbox workers, DB pool saturation, and stream memory pressure.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalapioutboxpendingoldest
        - alert: CaracalGatewaySTSExchangeErrors
          expr: increase(caracal_gateway_sts_exchange_errors_total[5m]) > {{ .Values.alertRules.gatewayStsExchangeErrors }}
          for: 2m
          labels:
            severity: warning
            component: gateway
          annotations:
            summary: Gateway cannot reliably exchange mandates with STS
            description: Protected requests may fail before upstream dispatch. Check Gateway readiness, STS readiness, route bindings, and service-to-service auth.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewaystsexchangeerrors
        - alert: CaracalGatewaySTSCircuitOpen
          expr: caracal_gateway_sts_circuit_open > {{ .Values.alertRules.gatewayStsCircuitOpen }}
          for: 1m
          labels:
            severity: critical
            component: gateway
          annotations:
            summary: Gateway STS circuit is open
            description: Gateway is fast-failing STS exchanges after repeated STS-unavailable failures. Protected requests that need exchanged authority are failing closed.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewaystscircuitopen
        - alert: CaracalGatewayRevocationSnapshotStale
          expr: caracal_gateway_revocation_snapshot_fresh <= {{ .Values.alertRules.gatewayRevocationSnapshotFresh }}
          for: 2m
          labels:
            severity: critical
            component: gateway
          annotations:
            summary: Gateway revocation snapshot is stale
            description: Gateway cannot prove it has a fresh revocation baseline. Treat as an access-safety incident and restore Postgres/Redis revocation snapshot loading before relying on protected routes.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewayrevocationsnapshotstale
        - alert: CaracalGatewayRevocationPropagationLag
          expr: caracal_gateway_revocation_propagation_seconds > {{ .Values.alertRules.gatewayRevocationPropagationSeconds }}
          for: 2m
          labels:
            severity: critical
            component: gateway
          annotations:
            summary: Gateway revocation propagation is delayed
            description: Revocation stream messages are reaching Gateway later than the configured safety window. Restore Redis consumer health and confirm pending entries are reclaimed.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewayrevocationpropagationlag
        - alert: CaracalGatewayRevocationReloadErrors
          expr: increase(caracal_gateway_revocation_reload_errors_total[5m]) > {{ .Values.alertRules.gatewayRevocationReloadErrors }}
          for: 2m
          labels:
            severity: critical
            component: gateway
          annotations:
            summary: Gateway revocation snapshot reloads are failing
            description: Gateway cannot refresh revocation state from Postgres. Treat this as an access-safety incident until reloads succeed and snapshot freshness returns.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalgatewayrevocationreloaderrors
        - alert: CaracalPostgresPoolSaturation
          expr: max by (service) (caracal_db_pool_in_use_ratio) > {{ .Values.alertRules.dbPoolInUseRatio }}
          for: 5m
          labels:
            severity: warning
            component: database
          annotations:
            summary: Postgres connection pool is near saturation
            description: A service is holding most of its Postgres pool. Inspect long-running queries, statement timeouts, and connection leaks before the pool exhausts and requests start failing.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalpostgrespoolsaturation
        - alert: CaracalReadinessFlapping
          expr: changes(kube_pod_container_status_ready{pod=~"{{ include "caracal.fullname" . }}-.*"}[10m]) > {{ .Values.alertRules.readinessFlapsPer10m }}
          for: 5m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: Caracal pod readiness is flapping
            description: A pod is repeatedly toggling Ready/NotReady. Check dependency health (Postgres/Redis), CPU throttling, OOM, and readiness probe timeouts.
            runbook_url: https://docs.caracal.run/operations/alerts/#caracalreadinessflapping
{{- end }}
