{{- define "caracal.deployment" -}}
{{- $root := index . "root" -}}
{{- $name := index . "name" -}}
{{- $service := index $root.Values.services $name -}}
{{- $replayService := or (eq $name "sts") (eq $name "gateway") -}}
{{- $statefulReplay := and $root.Values.replayPersistence.enabled $replayService -}}
{{- $stsAdminTokenSecretName := include "caracal.stsAdminTokenSecretName" $root -}}
{{- $auditAdminTokenSecretName := include "caracal.auditAdminTokenSecretName" $root -}}
{{- $metricsBearerSecretName := include "caracal.metricsBearerSecretName" $root -}}
{{- $controlEnabled := and (eq $name "api") $root.Values.control.enabled -}}
{{- $goService := or (eq $name "sts") (eq $name "gateway") (eq $name "audit") -}}
{{- $roleCommand := ternary (printf "/usr/local/bin/%s" $name) (printf "/app/%s/dist/main.js" $name) $goService -}}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: {{ ternary "StatefulSet" "Deployment" $statefulReplay }}
metadata:
  name: {{ include "caracal.fullname" $root }}-{{ $name }}
  labels:
    {{- include "caracal.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  {{- if $statefulReplay }}
  serviceName: {{ include "caracal.fullname" $root }}-{{ $name }}
  {{- else }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  {{- end }}
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
      {{- include "caracal.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "caracal.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        {{- with $root.Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if $root.Values.secrets.create }}
        checksum/secret: {{ $root.Values.secrets | toYaml | sha256sum }}
        {{- end }}
        {{- with $root.Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with default $root.Values.scheduling.priorityClassName $service.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $root.Values.scheduling.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "caracal.serviceAccountName" $root }}
      automountServiceAccountToken: {{ $root.Values.serviceAccount.automountToken }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- $affinity := default $root.Values.scheduling.affinity $service.affinity }}
      {{- if $affinity }}
      affinity:
        {{- tpl (toYaml $affinity) (dict "Values" $root.Values "name" $name "fullname" (include "caracal.fullname" $root)) | nindent 8 }}
      {{- end }}
      {{- $tsc := default $root.Values.scheduling.topologySpreadConstraints $service.topologySpreadConstraints }}
      {{- if $tsc }}
      topologySpreadConstraints:
        {{- tpl (toYaml $tsc) (dict "Values" $root.Values "name" $name "fullname" (include "caracal.fullname" $root)) | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "caracal.image" (dict "root" $root "image" $service.image) }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          command: [{{ $roleCommand | quote }}]
          ports:
            - name: http
              containerPort: {{ $service.port }}
          env:
            - name: CARACAL_MODE
              value: {{ $root.Values.global.mode | quote }}
            - name: PORT
              value: {{ $service.port | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: {{ $root.Values.global.logLevel | quote }}
            - name: DATABASE_URL_FILE
              value: /run/secrets/{{ $name }}DatabaseUrl
            - name: REDIS_URL_FILE
              value: /run/secrets/redisUrl
            - name: SECRET_STORE_KEK_FILE
              value: /run/secrets/secretStoreKek
            {{- if $root.Values.secrets.kekRotation }}
            - name: SECRET_STORE_KEK_PREVIOUS_FILE
              value: /run/secrets/secretStoreKekPrevious
            {{- end }}
            - name: AUDIT_HMAC_KEY_FILE
              value: /run/secrets/auditHmacKey
            - name: STREAMS_HMAC_KEY_FILE
              value: /run/secrets/streamsHmacKey
            - name: GATEWAY_STS_HMAC_KEY_FILE
              value: /run/secrets/gatewayStsHmacKey
            - name: CARACAL_ADMIN_TOKEN_FILE
              value: /run/secrets/caracalAdminToken
            {{- if and (eq $name "sts") $stsAdminTokenSecretName }}
            - name: STS_ADMIN_TOKEN_FILE
              value: /run/secrets/sts-admin-token/token
            {{- end }}
            {{- if and (eq $name "audit") $auditAdminTokenSecretName }}
            - name: AUDIT_ADMIN_TOKEN_FILE
              value: /run/secrets/audit-admin-token/token
            {{- end }}
            {{- if and $replayService $metricsBearerSecretName }}
            - name: METRICS_BEARER_FILE
              value: /run/secrets/metrics-bearer/bearer
            {{- end }}
            - name: STS_URL
              value: http://{{ include "caracal.fullname" $root }}-sts:{{ $root.Values.services.sts.port }}
            - name: ISSUER_URL
              value: {{ default (printf "http://%s-sts:%v" (include "caracal.fullname" $root) $root.Values.services.sts.port) $root.Values.services.sts.issuerUrl | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $root.Values.global.otelExporterOtlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_SERVICE_NAME
              value: caracal-{{ $name }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=caracal,deployment.environment={{ $root.Values.global.mode }}
            {{- if $controlEnabled }}
            - name: CARACAL_CONTROL_ENABLED
              value: "true"
            - name: CONTROL_GATE_FILE
              value: /run/caracal-control/enabled
            - name: STS_ISSUER_URL
              value: {{ default (printf "http://%s-sts:%v" (include "caracal.fullname" $root) $root.Values.services.sts.port) $root.Values.services.sts.issuerUrl | quote }}
            - name: STS_JWKS_URL
              value: {{ printf "%s/.well-known/jwks.json" (default (printf "http://%s-sts:%v" (include "caracal.fullname" $root) $root.Values.services.sts.port) $root.Values.services.sts.issuerUrl) | quote }}
            - name: CONTROL_AUDIENCE
              value: {{ default "caracal-control" $root.Values.control.audience | quote }}
            - name: CONTROL_API_TOKEN_FILE
              value: /run/secrets/caracalAdminToken
            {{- end }}
            {{- if eq $name "coordinator" }}
            - name: CARACAL_COORDINATOR_TOKEN_FILE
              value: /run/secrets/caracalCoordinatorToken
            - name: IDEMPOTENCY_HMAC_KEY_FILE
              value: /run/secrets/idempotencyHmacKey
            - name: IDEMPOTENCY_RETENTION_SECONDS
              value: {{ $root.Values.secrets.idempotency.retentionSeconds | quote }}
            - name: GENERATED_IDEMPOTENCY_RETENTION_SECONDS
              value: {{ $root.Values.secrets.idempotency.generatedRetentionSeconds | quote }}
            - name: IDEMPOTENCY_MAX_RECEIPTS_PER_SCOPE
              value: {{ $root.Values.secrets.idempotency.maxReceiptsPerScope | quote }}
            - name: COORDINATOR_BODY_LIMIT_BYTES
              value: {{ $root.Values.secrets.idempotency.bodyLimitBytes | quote }}
            - name: AGENT_COORDINATOR_SCOPE
              value: {{ default "agent:lifecycle" $service.requiredScope | quote }}
            {{- end }}
          volumeMounts:
            - name: runtime-secrets
              mountPath: /run/secrets
              readOnly: true
            {{- if and (eq $name "sts") $stsAdminTokenSecretName }}
            - name: sts-admin-token
              mountPath: /run/secrets/sts-admin-token
              readOnly: true
            {{- end }}
            {{- if and (eq $name "audit") $auditAdminTokenSecretName }}
            - name: audit-admin-token
              mountPath: /run/secrets/audit-admin-token
              readOnly: true
            {{- end }}
            {{- if and $replayService $metricsBearerSecretName }}
            - name: metrics-bearer
              mountPath: /run/secrets/metrics-bearer
              readOnly: true
            {{- end }}
            {{- if $replayService }}
            - name: replay
              mountPath: /var/lib/caracal
            {{- end }}
            {{- if $controlEnabled }}
            - name: control-gate
              mountPath: /run/caracal-control
              readOnly: true
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- if gt (int $root.Values.scheduling.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              sleep:
                seconds: {{ $root.Values.scheduling.preStopSleepSeconds }}
          {{- end }}
          resources:
            {{- toYaml $service.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: runtime-secrets
          {{ include "caracal.secretVolume" $root | nindent 10 }}
        {{- if and (eq $name "sts") $stsAdminTokenSecretName }}
        - name: sts-admin-token
          secret:
            secretName: {{ $stsAdminTokenSecretName | quote }}
            items:
              - key: {{ default "stsAdminToken" $root.Values.secrets.stsAdminToken.key | quote }}
                path: token
        {{- end }}
        {{- if and (eq $name "audit") $auditAdminTokenSecretName }}
        - name: audit-admin-token
          secret:
            secretName: {{ $auditAdminTokenSecretName | quote }}
            items:
              - key: {{ default "auditAdminToken" $root.Values.secrets.auditAdminToken.key | quote }}
                path: token
        {{- end }}
        {{- if and $replayService $metricsBearerSecretName }}
        - name: metrics-bearer
          secret:
            secretName: {{ $metricsBearerSecretName | quote }}
            items:
              - key: {{ default "metricsBearer" $root.Values.secrets.metricsBearer.key | quote }}
                path: bearer
        {{- end }}
        {{- if and $replayService (not $statefulReplay) }}
        - name: replay
          emptyDir: {}
        {{- end }}
        {{- if $controlEnabled }}
        - name: control-gate
          configMap:
            name: {{ include "caracal.fullname" $root }}-control-gate
        {{- end }}
      {{- if $statefulReplay }}
  volumeClaimTemplates:
    - metadata:
        name: replay
        labels:
          {{- include "caracal.labels" $root | nindent 10 }}
          app.kubernetes.io/component: {{ $name }}
      spec:
        accessModes:
          {{- toYaml $root.Values.replayPersistence.accessModes | nindent 10 }}
        {{- if $root.Values.replayPersistence.storageClassName }}
        storageClassName: {{ $root.Values.replayPersistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $root.Values.replayPersistence.size | quote }}
      {{- end }}
---
{{- end }}
{{- end -}}

{{ include "caracal.deployment" (dict "root" . "name" "sts") }}
{{ include "caracal.deployment" (dict "root" . "name" "api") }}
{{ include "caracal.deployment" (dict "root" . "name" "gateway") }}
{{ include "caracal.deployment" (dict "root" . "name" "audit") }}
{{ include "caracal.deployment" (dict "root" . "name" "coordinator") }}
