{{- $root := . -}}
{{- $service := $root.Values.services.web -}}
{{- if $service.enabled }}
{{- $fullname := include "caracal.fullname" $root -}}
{{- $secretName := include "caracal.runtimeSecretName" $root -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "caracal.labels" $root | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
      {{- include "caracal.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "caracal.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with $root.Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if $root.Values.secrets.create }}
        checksum/secret: {{ $root.Values.secrets | toYaml | sha256sum }}
        {{- end }}
        {{- with $root.Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with default $root.Values.scheduling.priorityClassName $service.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ $root.Values.scheduling.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "caracal.serviceAccountName" $root }}
      automountServiceAccountToken: {{ $root.Values.serviceAccount.automountToken }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- $affinity := default $root.Values.scheduling.affinity $service.affinity }}
      {{- if $affinity }}
      affinity:
        {{- tpl (toYaml $affinity) (dict "Values" $root.Values "name" "web" "fullname" $fullname) | nindent 8 }}
      {{- end }}
      {{- $tsc := default $root.Values.scheduling.topologySpreadConstraints $service.topologySpreadConstraints }}
      {{- if $tsc }}
      topologySpreadConstraints:
        {{- tpl (toYaml $tsc) (dict "Values" $root.Values "name" "web" "fullname" $fullname) | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "caracal.image" (dict "root" $root "image" $service.image) }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          command: ["/app/auth/dist/server.js"]
          ports:
            - name: http
              containerPort: {{ $service.port }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ $service.port | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: {{ $root.Values.global.logLevel | quote }}
            # The public origin the browser loads. Because the SPA is served same-origin by this
            # service, it is also the only trusted origin for credentialed requests.
            - name: CARACAL_AUTH_URL
              value: {{ required "services.web.publicUrl is required (the external HTTPS origin browsers load)" $service.publicUrl | quote }}
            - name: CARACAL_WEB_ORIGIN
              value: {{ $service.publicUrl | quote }}
            - name: CARACAL_AUTH_SECURE_COOKIES
              value: "true"
            # Internal control-plane endpoints, never exposed to the browser.
            - name: CARACAL_API_URL
              value: {{ include "caracal.serviceUrl" (dict "root" $root "name" "api") | quote }}
            - name: CARACAL_COORDINATOR_URL
              value: {{ include "caracal.serviceUrl" (dict "root" $root "name" "coordinator") | quote }}
            - name: CARACAL_AUTH_DATABASE_SSL
              value: {{ $service.databaseSsl | quote }}
            - name: CARACAL_AUTH_AUTO_MIGRATE
              value: {{ $service.autoMigrate | quote }}
            - name: CARACAL_AUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: authDatabaseUrl
            - name: CARACAL_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: caracalAuthSecret
            - name: CARACAL_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: caracalAdminToken
            - name: CARACAL_COORDINATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: caracalCoordinatorToken
            # Console sign-in allowlist. The projected volume below is optional, so the path
            # simply reads as "no entries" until an operator adds the operatorAllowlist.json
            # key (written by `caracal allowlist`) to the runtime secret.
            - name: CARACAL_OPERATOR_ALLOWLIST_FILE
              value: /run/caracalBootstrap/operatorAllowlist.json
            {{- with $service.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- if gt (int $root.Values.scheduling.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              sleep:
                seconds: {{ $root.Values.scheduling.preStopSleepSeconds }}
          {{- end }}
          resources:
            {{- toYaml $service.resources | nindent 12 }}
          volumeMounts:
            - name: allowlist
              mountPath: /run/caracalBootstrap
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        # Projects only the allowlist key, so no other runtime secret material reaches this pod.
        - name: allowlist
          secret:
            secretName: {{ $secretName | quote }}
            optional: true
            items:
              - key: operatorAllowlist.json
                path: operatorAllowlist.json
{{- end }}
