Optional evaluation secret template for Caracal runtime credentials.
*/}}

{{- if .Values.secrets.create }}
{{- if not .Values.global.evaluation }}
{{- fail "secrets.create=true stores credentials in plaintext and is only permitted for evaluation: set global.evaluation=true to acknowledge, or provision secrets externally (e.g. a secret manager / External Secrets Operator) and set secrets.create=false for production." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "caracal.runtimeSecretName" . }}
  labels:
    {{- include "caracal.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresPassword: {{ required "secrets.plaintext.postgresPassword is required when secrets.create=true" .Values.secrets.plaintext.postgresPassword | quote }}
  redisPassword: {{ required "secrets.plaintext.redisPassword is required when secrets.create=true" .Values.secrets.plaintext.redisPassword | quote }}
  caracalAdminToken: {{ required "secrets.plaintext.caracalAdminToken is required when secrets.create=true" .Values.secrets.plaintext.caracalAdminToken | quote }}
  {{- with .Values.secrets.plaintext.stsAdminToken }}
  stsAdminToken: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.plaintext.auditAdminToken }}
  auditAdminToken: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.plaintext.metricsBearer }}
  metricsBearer: {{ . | quote }}
  {{- end }}
  caracalCoordinatorToken: {{ required "secrets.plaintext.caracalCoordinatorToken is required when secrets.create=true" .Values.secrets.plaintext.caracalCoordinatorToken | quote }}
  caracalAuthSecret: {{ required "secrets.plaintext.caracalAuthSecret is required when secrets.create=true" .Values.secrets.plaintext.caracalAuthSecret | quote }}
  secretStoreKek: {{ required "secrets.plaintext.secretStoreKek is required when secrets.create=true" .Values.secrets.plaintext.secretStoreKek | quote }}
  {{- with .Values.secrets.plaintext.secretStoreKekPrevious }}
  secretStoreKekPrevious: {{ . | quote }}
  {{- end }}
  auditHmacKey: {{ required "secrets.plaintext.auditHmacKey is required when secrets.create=true" .Values.secrets.plaintext.auditHmacKey | quote }}
  streamsHmacKey: {{ required "secrets.plaintext.streamsHmacKey is required when secrets.create=true" .Values.secrets.plaintext.streamsHmacKey | quote }}
  idempotencyHmacKey: {{ required "secrets.plaintext.idempotencyHmacKey is required when secrets.create=true" .Values.secrets.plaintext.idempotencyHmacKey | quote }}
  gatewayStsHmacKey: {{ required "secrets.plaintext.gatewayStsHmacKey is required when secrets.create=true" .Values.secrets.plaintext.gatewayStsHmacKey | quote }}
  databaseUrl: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=%s" (urlquery .Values.secrets.database.user) (urlquery .Values.secrets.plaintext.postgresPassword) .Values.secrets.database.host .Values.secrets.database.port .Values.secrets.database.name .Values.secrets.database.sslMode | quote }}
  {{- /* Each service connects as its own least-privilege role. Evaluation installs
  derive the per-service passwords from the administrative password so no extra
  values are needed; the migration job provisions the logins from these keys. */}}
  {{- $root := . }}
  {{- range $role := list "api" "sts" "gateway" "audit" "coordinator" "auth" }}
  {{- $password := sha256sum (printf "%s:caracal%s" $root.Values.secrets.plaintext.postgresPassword $role) }}
  {{ $role }}DbPassword: {{ $password | quote }}
  {{- if eq $role "auth" }}
  authDatabaseUrl: {{ printf "postgres://caracalauth:%s@%s:%v/%s?sslmode=%s" (urlquery $password) $root.Values.secrets.database.host $root.Values.secrets.database.port $root.Values.secrets.authDatabase.name $root.Values.secrets.database.sslMode | quote }}
  {{- else }}
  {{ $role }}DatabaseUrl: {{ printf "postgres://caracal%s:%s@%s:%v/%s?sslmode=%s" $role (urlquery $password) $root.Values.secrets.database.host $root.Values.secrets.database.port $root.Values.secrets.database.name $root.Values.secrets.database.sslMode | quote }}
  {{- end }}
  {{- end }}
  redisUrl: {{ printf "redis://:%s@%s:%v/%v" (urlquery .Values.secrets.plaintext.redisPassword) .Values.secrets.redis.host .Values.secrets.redis.port .Values.secrets.redis.database | quote }}
{{- end }}
