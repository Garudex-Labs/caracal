# Default Helm values for a Caracal Kubernetes deployment.

global:
  registry: ghcr.io/garudex-labs
  # Image tag override; defaults to the chart appVersion.
  tag: ""
  imagePullPolicy: IfNotPresent
  # Secret names used to pull images from private registries, e.g. [{name: ghcr-pull}].
  imagePullSecrets: []
  mode: rc
  evaluation: false
  otelExporterOtlpEndpoint: ""
  logLevel: info
  podLabels: {}
  podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  automountToken: false

secrets:
  create: false
  runtimeSecretName: caracal-runtime
  # During a KEK rotation window the runtime secret carries the retiring key as
  # secretStoreKekPrevious; enabling this wires it into the services until the
  # re-seal sweep completes and the key is removed.
  kekRotation: false
  plaintext:
    postgresPassword: ""
    redisPassword: ""
    caracalAdminToken: ""
    stsAdminToken: ""
    auditAdminToken: ""
    metricsBearer: ""
    caracalCoordinatorToken: ""
    caracalAuthSecret: ""
    secretStoreKek: ""
    secretStoreKekPrevious: ""
    auditHmacKey: ""
    streamsHmacKey: ""
    gatewayStsHmacKey: ""
  database:
    user: caracal
    passwordKey: postgresPassword
    host: postgres.default.svc.cluster.local
    port: 5432
    name: caracal
    sslMode: require
  authDatabase:
    name: caracal_auth
  redis:
    passwordKey: redisPassword
    host: redis.default.svc.cluster.local
    port: 6379
    database: 0
  stsAdminToken:
    secretName: ""
    key: stsAdminToken
  auditAdminToken:
    secretName: ""
    key: auditAdminToken
  metricsBearer:
    secretName: ""
    key: metricsBearer

migrations:
  enabled: true
  backoffLimit: 3
  # Upper bound before a hung migration Job fails the install/upgrade instead of blocking it forever.
  activeDeadlineSeconds: 900
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

networkPolicy:
  enabled: true
  # When extraEgress is empty, the policy allows Postgres ({{ .secrets.database.port }}),
  # Redis ({{ .secrets.redis.port }}), and OTLP (4317/4318). Platform teams should set dnsEgress
  # and extraEgress to named peers or CIDRs for DNS, provider APIs, object stores, identity providers,
  # and other upstreams.
  # extraIngress is the only supported way to admit traffic from outside Caracal pods.
  # For Gateway ingress controllers, add a rule with an explicit from selector and port 8081.
  extraIngress: []
  allowOpenHttps: false
  allowOpenDns: false
  dnsEgress: []
  extraEgress: []

replayPersistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

serviceMonitor:
  enabled: false
  interval: 30s

alertRules:
  enabled: true
  labels: {}
  stsMaxPolicyAgeSeconds: 300
  auditDlqSize: 0
  auditDlqGrowth: 0
  auditConsumerLag: 1000
  auditReplayOldestAgeSeconds: 300
  apiOutboxDead: 0
  apiOutboxPendingAgeSeconds: 300
  gatewayStsExchangeErrors: 0
  gatewayStsCircuitOpen: 0
  gatewayRevocationSnapshotFresh: 0
  gatewayRevocationPropagationSeconds: 30
  gatewayRevocationReloadErrors: 0
  stsProviderRefreshErrors: 0
  stsProviderCircuitOpen: 0
  dbPoolInUseRatio: 0.9
  readinessFlapsPer10m: 4

scheduling:
  # Existing PriorityClass assigned to every Caracal workload so the control plane
  # outlives best-effort pods under node pressure. Override per service via
  # services.<name>.priorityClassName.
  priorityClassName: ""
  # Rolling updates and evictions first remove the pod from Service endpoints, then the
  # preStop sleep lets in-flight requests drain before SIGTERM; the grace period bounds
  # the remaining shutdown (audit flush, replay persistence, connection close).
  terminationGracePeriodSeconds: 30
  preStopSleepSeconds: 5
  # Soft pod-anti-affinity on hostname spreads replicas of the same service
  # across nodes; topology spread balances them across failure domains.
  # Override per service via services.<name>.affinity / topologySpreadConstraints.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: caracal
                app.kubernetes.io/component: "{{ .name }}"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: caracal
          app.kubernetes.io/component: "{{ .name }}"

services:
  sts:
    enabled: true
    replicas: 2
    image: caracal-go
    port: 8080
    issuerUrl: ""
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  api:
    enabled: true
    replicas: 2
    image: caracal-node
    port: 3000
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  gateway:
    enabled: true
    replicas: 2
    image: caracal-go
    port: 8081
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 16
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 80
  audit:
    enabled: true
    replicas: 2
    image: caracal-go
    port: 9090
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  coordinator:
    enabled: true
    replicas: 2
    image: caracal-node
    port: 4000
    requiredScope: agent:lifecycle
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 768Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  # Browser-facing web tier: the SPA served same-origin from its session-guarded
  # backend-for-frontend. The only service intended for ingress exposure.
  web:
    enabled: true
    replicas: 2
    image: caracal-web
    port: 3002
    # The external HTTPS origin browsers load; also the only trusted same-origin for
    # credentialed requests. Required - set this to your public hostname.
    publicUrl: https://caracal.example.com
    databaseSsl: require
    # Better Auth schema provisioning. Keep "false" for multi-replica deployments: the
    # caracal-*-auth-migrate hook Job creates the auth database and applies the schema once
    # before rollout. Set "true" only for a single-replica install with no migration Job.
    autoMigrate: "false"
    # Additional environment entries for the auth tier, rendered verbatim into the container.
    # Use these to configure registration posture (CARACAL_OPEN_REGISTRATION,
    # CARACAL_PASSWORD_SIGNUP), social sign-in (GOOGLE_CLIENT_ID/GOOGLE_CLIENT_SECRET,
    # GITHUB_CLIENT_ID/GITHUB_CLIENT_SECRET), and mail delivery for password reset and
    # verification (CARACAL_SMTP_URL, CARACAL_SMTP_FROM). Console sign-in admission is the
    # operatorAllowlist.json key on the runtime secret, projected read-only into the pod.
    # Reference credentials with valueFrom.secretKeyRef rather than inline values.
    extraEnv: []
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 384Mi
    pdb:
      enabled: true
      minAvailable: "50%"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

# In-process control plane hosted by the API. Disabled by default.
control:
  enabled: false
  audience: caracal-control

ingress:
  gateway:
    enabled: false
    className: ""
    host: gateway.caracal.example.com
    tlsSecretName: ""
    annotations: {}
  api:
    enabled: false
    className: ""
    host: api.caracal.example.com
    tlsSecretName: ""
    annotations: {}
  web:
    enabled: true
    className: ""
    host: caracal.example.com
    tlsSecretName: ""
    annotations: {}
