name: caracal

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CCL_DB_NAME:-caracal}
      POSTGRES_USER: ${CCL_DB_USER:-caracal}
      POSTGRES_PASSWORD: ${CCL_DB_PASSWORD:?Set CCL_DB_PASSWORD to a strong database password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CCL_DB_USER:-caracal} -d ${CCL_DB_NAME:-caracal}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - caracal-runtime

  vault:
    image: ${CCL_VAULT_SIDECAR_IMAGE:-${VAULT_IMAGE:-infisical/infisical:v0.93.1}}
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${CCL_VAULT_SIDECAR_AUTH_SECRET:-${VAULT_AUTH_SECRET:?Set CCL_VAULT_SIDECAR_AUTH_SECRET or run `caracal vault init` for local development}}
      ENCRYPTION_KEY: ${CCL_VAULT_SIDECAR_ENCRYPTION_KEY:-${VAULT_ENC_KEY:?Set CCL_VAULT_SIDECAR_ENCRYPTION_KEY or run `caracal vault init` for local development}}
      REDIS_URL: ${CCL_VAULT_SIDECAR_REDIS_URL:-redis://redis:6379}
      DB_CONNECTION_URI: ${CCL_VAULT_SIDECAR_DB_CONNECTION_URI:-postgresql://${CCL_DB_USER:-caracal}:${CCL_DB_PASSWORD:?Set CCL_DB_PASSWORD to a strong database password}@postgres:5432/${CCL_DB_NAME:-caracal}}
      SITE_URL: ${CCL_VAULT_SIDECAR_SITE_URL:-http://localhost:8080}
    ports:
      - "${CCL_VAULT_SIDECAR_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks:
      - caracal-runtime

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - caracal-runtime

  mcp:
    image: ${CCL_RUNTIME_IMAGE:-ghcr.io/garudex-labs/caracal-runtime:0.8.0}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CCL_RUNTIME_IN_CONTAINER: "1"
      CCL_HOME: /home/caracal/runtime
      CCL_HOST_IO_ROOT: /caracal-host-io
      CCL_API_URL: http://mcp:8080
      CCL_CONFIG_PATH: /home/caracal/runtime/config.yaml
      CCL_MCP_LISTEN_ADDRESS: 0.0.0.0:8080
      CCL_PRINCIPAL_KEY_BACKEND: ${CCL_PRINCIPAL_KEY_BACKEND:-vault}
      CCL_VAULT_URL: ${CCL_VAULT_URL:-http://vault:8080}
      CCL_VAULT_TOKEN: ${CCL_VAULT_TOKEN:?Set CCL_VAULT_TOKEN to an Infisical service token}
      CCL_VAULT_WORKSPACE_ID: ${CCL_VAULT_WORKSPACE_ID:-}
      CCL_VAULT_ENVIRONMENT: ${CCL_VAULT_ENVIRONMENT:-dev}
      CCL_VAULT_SECRET_PATH: ${CCL_VAULT_SECRET_PATH:-/}
      CCL_VAULT_SIGNING_KEY_REF: ${CCL_VAULT_SIGNING_KEY_REF:-keys/mandate-signing}
      CCL_VAULT_SESSION_PUBLIC_KEY_REF: ${CCL_VAULT_SESSION_PUBLIC_KEY_REF:-keys/session-public}
      CCL_VAULT_MERKLE_SIGNING_KEY_REF: ${CCL_VAULT_MERKLE_SIGNING_KEY_REF:-keys/merkle-signing}
      CCL_VAULT_MERKLE_PUBLIC_KEY_REF: ${CCL_VAULT_MERKLE_PUBLIC_KEY_REF:-keys/merkle-signing-public}
      CCL_SESSION_SIGNING_ALGORITHM: ${CCL_SESSION_SIGNING_ALGORITHM:-RS256}
      CCL_VAULT_MODE: ${CCL_VAULT_MODE:-managed}
      CCL_VAULT_RETRY_MAX_ATTEMPTS: ${CCL_VAULT_RETRY_MAX_ATTEMPTS:-3}
      CCL_VAULT_RETRY_BACKOFF_SECONDS: ${CCL_VAULT_RETRY_BACKOFF_SECONDS:-0.2}
      CCL_ENV_MODE: ${CCL_ENV_MODE:-prod}
      CCL_DEBUG_LOGS: ${CCL_DEBUG_LOGS:-false}
      CCL_JSON_LOGS: ${CCL_JSON_LOGS:-false}
      CCL_DB_HOST: postgres
      CCL_DB_PORT: 5432
      CCL_DB_NAME: ${CCL_DB_NAME:-caracal}
      CCL_DB_USER: ${CCL_DB_USER:-caracal}
      CCL_DB_PASSWORD: ${CCL_DB_PASSWORD:?Set CCL_DB_PASSWORD to a strong database password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CCL_AIS_ATTESTATION_NONCE: ${CCL_AIS_ATTESTATION_NONCE:-}
      CCL_AIS_ATTESTATION_PRINCIPAL_ID: ${CCL_AIS_ATTESTATION_PRINCIPAL_ID:-}
      CCL_AIS_API_PREFIX: ${CCL_AIS_API_PREFIX:-/v1/ais}
      CCL_AIS_UNIX_SOCKET_PATH: ${CCL_AIS_UNIX_SOCKET_PATH:-/tmp/caracal-ais.sock}
      CCL_AIS_LISTEN_HOST: ${CCL_AIS_LISTEN_HOST:-127.0.0.1}
      CCL_AIS_LISTEN_PORT: ${CCL_AIS_LISTEN_PORT:-7079}
      CCL_AIS_HEALTHCHECK_TIMEOUT_SECONDS: ${CCL_AIS_HEALTHCHECK_TIMEOUT_SECONDS:-3}
      CCL_AIS_HEALTHCHECK_INTERVAL_SECONDS: ${CCL_AIS_HEALTHCHECK_INTERVAL_SECONDS:-10}
      CCL_AIS_STARTUP_TIMEOUT_SECONDS: ${CCL_AIS_STARTUP_TIMEOUT_SECONDS:-30}
      CCL_AIS_MAX_RESTARTS: ${CCL_AIS_MAX_RESTARTS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["caracal", "runtime-mcp"]
    volumes:
      - runtime_data:/home/caracal/runtime
      - ${CCL_HOST_IO_DIR:-./caracal-host-io}:/caracal-host-io:z
    ports:
      - "${CCL_API_PORT:-8000}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - caracal-runtime

  cli:
    profiles: ["tools"]
    image: ${CCL_RUNTIME_IMAGE:-ghcr.io/garudex-labs/caracal-runtime:0.8.0}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CCL_RUNTIME_IN_CONTAINER: "1"
      CCL_HOME: /home/caracal/runtime
      CCL_HOST_IO_ROOT: /caracal-host-io
      CCL_API_URL: http://mcp:8080
      CCL_CONFIG_PATH: /home/caracal/runtime/config.yaml
      CCL_PRINCIPAL_KEY_BACKEND: ${CCL_PRINCIPAL_KEY_BACKEND:-vault}
      CCL_VAULT_URL: ${CCL_VAULT_URL:-http://vault:8080}
      CCL_VAULT_TOKEN: ${CCL_VAULT_TOKEN:?Set CCL_VAULT_TOKEN to an Infisical service token}
      CCL_VAULT_WORKSPACE_ID: ${CCL_VAULT_WORKSPACE_ID:-}
      CCL_VAULT_ENVIRONMENT: ${CCL_VAULT_ENVIRONMENT:-dev}
      CCL_VAULT_SECRET_PATH: ${CCL_VAULT_SECRET_PATH:-/}
      CCL_VAULT_SIGNING_KEY_REF: ${CCL_VAULT_SIGNING_KEY_REF:-keys/mandate-signing}
      CCL_VAULT_SESSION_PUBLIC_KEY_REF: ${CCL_VAULT_SESSION_PUBLIC_KEY_REF:-keys/session-public}
      CCL_VAULT_MERKLE_SIGNING_KEY_REF: ${CCL_VAULT_MERKLE_SIGNING_KEY_REF:-keys/merkle-signing}
      CCL_VAULT_MERKLE_PUBLIC_KEY_REF: ${CCL_VAULT_MERKLE_PUBLIC_KEY_REF:-keys/merkle-signing-public}
      CCL_SESSION_SIGNING_ALGORITHM: ${CCL_SESSION_SIGNING_ALGORITHM:-RS256}
      CCL_VAULT_MODE: ${CCL_VAULT_MODE:-managed}
      CCL_VAULT_RETRY_MAX_ATTEMPTS: ${CCL_VAULT_RETRY_MAX_ATTEMPTS:-3}
      CCL_VAULT_RETRY_BACKOFF_SECONDS: ${CCL_VAULT_RETRY_BACKOFF_SECONDS:-0.2}
      CCL_ENV_MODE: ${CCL_ENV_MODE:-prod}
      CCL_DEBUG_LOGS: ${CCL_DEBUG_LOGS:-false}
      CCL_JSON_LOGS: ${CCL_JSON_LOGS:-false}
      CCL_DB_HOST: postgres
      CCL_DB_PORT: 5432
      CCL_DB_NAME: ${CCL_DB_NAME:-caracal}
      CCL_DB_USER: ${CCL_DB_USER:-caracal}
      CCL_DB_PASSWORD: ${CCL_DB_PASSWORD:?Set CCL_DB_PASSWORD to a strong database password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["caracal"]
    volumes:
      - runtime_data:/home/caracal/runtime
      - ${CCL_HOST_IO_DIR:-./caracal-host-io}:/caracal-host-io:z
    stdin_open: true
    tty: true
    networks:
      - caracal-runtime

  flow:
    profiles: ["tui"]
    image: ${CCL_RUNTIME_IMAGE:-ghcr.io/garudex-labs/caracal-runtime:0.8.0}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      HOME: /home/caracal
      CCL_RUNTIME_IN_CONTAINER: "1"
      CCL_HOME: /home/caracal/runtime
      CCL_HOST_IO_ROOT: /caracal-host-io
      CCL_API_URL: http://mcp:8080
      CCL_CONFIG_PATH: /home/caracal/runtime/config.yaml
      CCL_PRINCIPAL_KEY_BACKEND: ${CCL_PRINCIPAL_KEY_BACKEND:-vault}
      CCL_VAULT_URL: ${CCL_VAULT_URL:-http://vault:8080}
      CCL_VAULT_TOKEN: ${CCL_VAULT_TOKEN:?Set CCL_VAULT_TOKEN to an Infisical service token}
      CCL_VAULT_WORKSPACE_ID: ${CCL_VAULT_WORKSPACE_ID:-}
      CCL_VAULT_ENVIRONMENT: ${CCL_VAULT_ENVIRONMENT:-dev}
      CCL_VAULT_SECRET_PATH: ${CCL_VAULT_SECRET_PATH:-/}
      CCL_VAULT_SIGNING_KEY_REF: ${CCL_VAULT_SIGNING_KEY_REF:-keys/mandate-signing}
      CCL_VAULT_SESSION_PUBLIC_KEY_REF: ${CCL_VAULT_SESSION_PUBLIC_KEY_REF:-keys/session-public}
      CCL_VAULT_MERKLE_SIGNING_KEY_REF: ${CCL_VAULT_MERKLE_SIGNING_KEY_REF:-keys/merkle-signing}
      CCL_VAULT_MERKLE_PUBLIC_KEY_REF: ${CCL_VAULT_MERKLE_PUBLIC_KEY_REF:-keys/merkle-signing-public}
      CCL_SESSION_SIGNING_ALGORITHM: ${CCL_SESSION_SIGNING_ALGORITHM:-RS256}
      CCL_VAULT_MODE: ${CCL_VAULT_MODE:-managed}
      CCL_VAULT_RETRY_MAX_ATTEMPTS: ${CCL_VAULT_RETRY_MAX_ATTEMPTS:-3}
      CCL_VAULT_RETRY_BACKOFF_SECONDS: ${CCL_VAULT_RETRY_BACKOFF_SECONDS:-0.2}
      CCL_ENV_MODE: ${CCL_ENV_MODE:-prod}
      CCL_DEBUG_LOGS: ${CCL_DEBUG_LOGS:-false}
      CCL_JSON_LOGS: ${CCL_JSON_LOGS:-false}
      TERM: xterm-256color
      COLORTERM: truecolor
      CCL_DB_HOST: postgres
      CCL_DB_PORT: 5432
      CCL_DB_NAME: ${CCL_DB_NAME:-caracal}
      CCL_DB_USER: ${CCL_DB_USER:-caracal}
      CCL_DB_PASSWORD: ${CCL_DB_PASSWORD:?Set CCL_DB_PASSWORD to a strong database password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["python", "-m", "caracal.flow.main"]
    volumes:
      - runtime_data:/home/caracal/runtime
      - ${CCL_HOST_IO_DIR:-./caracal-host-io}:/caracal-host-io:z
    stdin_open: true
    tty: true
    networks:
      - caracal-runtime

volumes:
  postgres_data:
  redis_data:
  runtime_data:

networks:
  caracal-runtime:
    name: ${CCL_RUNTIME_NETWORK:-caracal-runtime}
