# Caracal OSS deployment configuration.
# This example matches the current broker-only open-source architecture.

storage:
  backup_dir: ${CCL_HOME:~/.caracal}/backups
  backup_count: 3

database:
  host: ${CCL_DB_HOST:localhost}
  port: ${CCL_DB_PORT:5432}
  database: ${CCL_DB_NAME:caracal}
  user: ${CCL_DB_USER:caracal}
  password: ${CCL_DB_PASSWORD:caracal}
  pool_size: ${CCL_DB_POOL_SIZE:10}
  max_overflow: ${CCL_DB_MAX_OVERFLOW:5}
  pool_timeout: ${CCL_DB_POOL_TTL:30}

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${CCL_REDIS_PASSWORD:?Set CCL_REDIS_PASSWORD to a strong Redis password}
  db: ${REDIS_DB:0}
  ssl: false
  metrics_cache_ttl: 3600
  allowlist_cache_ttl: 60

mcp_adapter:
  enabled: true
  listen_address: ${CCL_MCP_LISTEN_ADDR:0.0.0.0:8080}
  mcp_server_urls: []
  health_check_enabled: true

merkle:
  batch_size_limit: 1000
  batch_timeout_seconds: 300
  signing_algorithm: ES256
  signing_backend: vault
  vault_key_ref: ${CCL_VAULT_MERKLE_SIGNING_KEY_REF:keys/merkle-signing}
  vault_public_key_ref: ${CCL_VAULT_MERKLE_PUB_KEY_REF:keys/merkle-signing-public}
  key_rotation_enabled: false

snapshot:
  enabled: true
  schedule_cron: "0 0 * * *"
  retention_days: 90
  storage_path: ${CCL_HOME:~/.caracal}/snapshots
  compression_enabled: true
  auto_cleanup_enabled: true

allowlist:
  enabled: true
  default_behavior: deny
  cache_ttl: 60
  max_patterns_per_principal: 1000

defaults:
  time_window: daily

logging:
  level: ${LOG_LEVEL:INFO}
  file: ${CCL_HOME:~/.caracal}/logs/caracal.log
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

performance:
  policy_eval_timeout_ms: 100
  ledger_write_timeout_ms: 10
  file_lock_timeout_s: 5
  max_retries: 3
